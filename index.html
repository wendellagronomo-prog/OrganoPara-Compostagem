<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1b4332">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Organo Pará">

<title>Organo Pará — Controle de Compostagem</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --verde:#2d6a4f;--verde-esc:#1b4332;--verde-clr:#d8f3dc;--verde-med:#52b788;
  --laranja:#e07b2a;--laranja-clr:#fde9d4;--laranja-esc:#b85e15;
  --marrom:#4a3728;--marrom-clr:#f2e9dc;
  --cinza-bg:#f7f4f0;--papel:#ffffff;--linha:#e8ddd2;
  --ink:#2b1d12;--ink-soft:#7a6250;
  --radius:10px;--radius-lg:16px;--shadow:0 1px 3px rgba(43,29,18,.08);
  --font-display:"Fraunces",serif;--font-body:"Source Sans 3",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:var(--font-body);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
body{background:var(--cinza-bg);color:var(--ink)}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--verde-esc) 0%,var(--verde) 50%,var(--laranja-esc) 100%);padding:20px}
.login-card{background:#fff;border-radius:20px;padding:40px 36px;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.25);text-align:center}
.login-logo{width:180px;margin:0 auto 24px;display:block}
.login-title{font-family:var(--font-display);font-size:20px;font-weight:600;color:var(--verde-esc);margin-bottom:4px}
.login-sub{font-size:12.5px;color:var(--ink-soft);margin-bottom:28px}
.login-field{text-align:left;margin-bottom:14px}
.login-field label{font-size:12px;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:4px}
.login-field input{width:100%;padding:10px 12px;border:1.5px solid var(--linha);border-radius:8px;font-size:14px;font-family:var(--font-body);color:var(--ink)}
.login-field input:focus{outline:none;border-color:var(--laranja)}
.login-btn{width:100%;padding:11px;background:var(--laranja);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:var(--font-body);cursor:pointer;transition:.15s}
.login-btn:hover{background:var(--laranja-esc)}
.login-err{color:#c0392b;font-size:12.5px;margin-top:8px;min-height:18px}

/* APP */
#appShell{display:none}
.app{display:flex;min-height:100vh}

/* SIDEBAR */
.sidebar{width:240px;flex-shrink:0;background:var(--verde-esc);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50;overflow-y:auto}
.sidebar-brand{padding:16px 14px 10px;border-bottom:1px solid rgba(255,255,255,.1)}
.brand-logo{width:130px;display:block;margin:0 auto 6px;border-radius:4px}
.brand-sub{text-align:center;font-size:10px;color:rgba(255,255,255,.45);letter-spacing:.06em;text-transform:uppercase}

/* Ciclo switcher in sidebar */
.sidebar-ciclo{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-ciclo-label{font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.4);margin-bottom:5px}
.sidebar-ciclo-select{width:100%;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:#fff;border-radius:8px;padding:7px 10px;font-size:12.5px;font-family:var(--font-body);cursor:pointer}
.sidebar-ciclo-select:focus{outline:none;border-color:var(--laranja)}
.sidebar-ciclo-btns{display:flex;gap:6px;margin-top:6px}
.ciclo-btn{flex:1;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);border-radius:6px;padding:4px;font-size:11px;cursor:pointer;font-family:var(--font-body);display:flex;align-items:center;justify-content:center;gap:3px}
.ciclo-btn:hover{background:rgba(255,255,255,.15)}
.ciclo-btn.primary{background:var(--laranja);border-color:var(--laranja);color:#fff}

.sidebar-user{padding:8px 14px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:8px}
.user-avatar{width:28px;height:28px;border-radius:50%;background:var(--laranja);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.user-info .name{font-size:12.5px;font-weight:600;color:#fff}
.user-info .role{font-size:10px;color:rgba(255,255,255,.5)}

.sidebar-nav{flex:1;padding:6px}
.nav-group{font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.35);padding:10px 10px 3px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;color:rgba(255,255,255,.8);cursor:pointer;font-size:13px;border:none;background:none;width:100%;text-align:left;font-family:var(--font-body);transition:.12s}
.nav-item i{font-size:16px;width:18px;text-align:center;flex-shrink:0}
.nav-item:hover{background:rgba(255,255,255,.07)}
.nav-item.active{background:var(--laranja)!important;color:#fff!important}
.nav-item.active i{color:#fff!important}

.sidebar-footer{padding:10px 14px;border-top:1px solid rgba(255,255,255,.08)}
.sidebar-footer button{width:100%;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.7);border-radius:8px;padding:7px;font-size:12px;cursor:pointer;margin-bottom:5px;display:flex;align-items:center;justify-content:center;gap:6px;font-family:var(--font-body)}
.sidebar-footer button:hover{background:rgba(255,255,255,.12)}
.logout-btn{background:rgba(224,123,42,.15)!important;border-color:rgba(224,123,42,.3)!important;color:var(--laranja-clr)!important}

/* MAIN */
.main{flex:1;margin-left:240px;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid var(--linha);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;position:sticky;top:0;z-index:30;flex-wrap:wrap}
.topbar-left .page-title{font-family:var(--font-display);font-size:22px;font-weight:600;color:var(--verde-esc)}
.topbar-left .page-sub{font-size:12px;color:var(--ink-soft);margin-top:1px}
.filter-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.filter-field{display:flex;flex-direction:column;gap:3px}
.filter-field label{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft)}
.filter-field select,.filter-field input{font-family:var(--font-body);font-size:13px;padding:7px 10px;border:1.5px solid var(--linha);border-radius:8px;background:#fff;color:var(--ink);min-width:140px}
.filter-field select:focus,.filter-field input:focus{outline:none;border-color:var(--laranja)}
.ciclo-badge{background:var(--laranja-clr);color:var(--laranja-esc);border-radius:20px;padding:5px 14px;font-size:12.5px;font-weight:700;white-space:nowrap;border:1px solid var(--laranja)}

.content{padding:22px 26px;flex:1}

/* GRIDS */
.grid{display:grid;gap:16px}
.g2{grid-template-columns:repeat(2,minmax(0,1fr))}
.g3{grid-template-columns:repeat(3,minmax(0,1fr))}
.g4{grid-template-columns:repeat(4,minmax(0,1fr))}
.g5{grid-template-columns:repeat(5,minmax(0,1fr))}
@media(max-width:1100px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}.g5{grid-template-columns:repeat(3,1fr)}}
@media(max-width:680px){.g2,.g3,.g4,.g5{grid-template-columns:1fr}}

/* CARDS */
.card{background:#fff;border:1px solid var(--linha);border-radius:var(--radius-lg);padding:18px 20px;box-shadow:var(--shadow)}
.card-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.card-title{font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--verde-esc);display:flex;align-items:center;gap:8px}
.card-title i{font-size:18px;color:var(--laranja)}
.metric{background:#fff;border:1px solid var(--linha);border-radius:var(--radius-lg);padding:16px 18px;position:relative;overflow:hidden}
.metric::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--acc,var(--laranja))}
.metric .label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);margin-bottom:6px}
.metric .value{font-family:var(--font-display);font-size:26px;font-weight:600;line-height:1.1}
.metric .sub{font-size:12px;color:var(--ink-soft);margin-top:4px}
.m-laranja{--acc:var(--laranja)}.m-verde{--acc:var(--verde)}.m-marrom{--acc:var(--marrom)}.m-verde-med{--acc:var(--verde-med)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:20px;white-space:nowrap}
.bv{background:var(--verde-clr);color:var(--verde-esc)}.bl{background:var(--laranja-clr);color:var(--laranja-esc)}
.ba{background:#fff3cd;color:#7a5413}.br{background:#fbe3d6;color:#7a3318}
.bc{background:#eee9e1;color:var(--ink-soft)}.bm{background:var(--marrom-clr);color:var(--marrom)}.baz{background:#dbeafe;color:#1e3a5f}

/* TABLE */
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--linha)}
table{width:100%;border-collapse:collapse;font-size:13px;background:#fff}
thead th{background:var(--marrom-clr);color:var(--marrom);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:9px 10px;text-align:left;white-space:nowrap;border-bottom:1px solid var(--linha)}
tbody td{padding:8px 10px;border-bottom:1px solid var(--linha);vertical-align:middle}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--laranja-clr)}
td input,td select{width:100%;font-family:var(--font-body);font-size:12.5px;padding:5px 7px;border:1px solid var(--linha);border-radius:6px;background:#fff;color:var(--ink)}
td input:focus,td select:focus{outline:none;border-color:var(--laranja)}
td.calc{background:var(--verde-clr);color:var(--verde-esc);font-weight:600;text-align:right}
td.num{text-align:right;font-variant-numeric:tabular-nums}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-body);font-size:13px;font-weight:600;padding:8px 14px;border-radius:8px;border:1.5px solid var(--linha);background:#fff;color:var(--ink);cursor:pointer;transition:.12s;white-space:nowrap}
.btn:hover{border-color:var(--laranja);color:var(--laranja-esc)}
.btn-primary{background:var(--laranja);color:#fff;border-color:var(--laranja)}
.btn-primary:hover{background:var(--laranja-esc);border-color:var(--laranja-esc);color:#fff}
.btn-verde{background:var(--verde);color:#fff;border-color:var(--verde)}
.btn-verde:hover{background:var(--verde-esc);color:#fff}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-danger{color:#c0392b}.btn-danger:hover{border-color:#c0392b}

/* STAGE / PROGRESS */
.stage-track{display:flex;gap:3px}
.stage-seg{height:8px;flex:1;border-radius:4px;background:#e8ddd2}
.stage-seg.done{background:var(--verde)}.stage-seg.active{background:var(--laranja)}
.stage-labels{display:flex;justify-content:space-between;font-size:10px;color:var(--ink-soft);margin-top:4px}
.progress-bar{height:7px;border-radius:4px;background:#e8ddd2;overflow:hidden}
.progress-fill{height:100%;border-radius:4px;background:var(--verde)}
.progress-fill.warn{background:var(--laranja)}.progress-fill.danger{background:#c0392b}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(43,29,18,.45);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:36px 16px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:var(--radius-lg);width:100%;max-width:560px;margin:auto;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--linha);display:flex;align-items:center;justify-content:space-between}
.modal-head .title{font-family:var(--font-display);font-size:17px;font-weight:600;color:var(--verde-esc);display:flex;align-items:center;gap:8px}
.modal-head .title i{color:var(--laranja)}
.modal-body{padding:18px 20px}.modal-foot{padding:14px 20px;border-top:1px solid var(--linha);display:flex;justify-content:flex-end;gap:8px}
.modal-close{background:none;border:none;font-size:20px;color:var(--ink-soft);cursor:pointer}
.field{margin-bottom:13px}
.field label{font-size:12px;font-weight:700;color:var(--ink-soft);display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;font-family:var(--font-body);font-size:13.5px;padding:9px 11px;border:1.5px solid var(--linha);border-radius:8px;background:#fff;color:var(--ink)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--laranja)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}

/* INFO BARS */
.info-bar{border-radius:var(--radius);padding:10px 14px;font-size:12.5px;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px}
.info-verde{background:var(--verde-clr);border-left:4px solid var(--verde);color:var(--verde-esc)}
.info-laranja{background:var(--laranja-clr);border-left:4px solid var(--laranja);color:var(--laranja-esc)}
.info-azul{background:#dbeafe;border-left:4px solid #3a7ca5;color:#1e3a5f}

/* EMPTY */
.empty{text-align:center;padding:36px 20px;color:var(--ink-soft)}
.empty i{font-size:38px;color:var(--linha);margin-bottom:10px;display:block}
.empty .title{font-family:var(--font-display);font-size:16px;color:var(--ink);margin-bottom:4px;font-weight:600}

/* TOAST */
#toast{position:fixed;bottom:22px;right:22px;background:var(--verde-esc);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;display:none;align-items:center;gap:8px;z-index:200;box-shadow:0 6px 20px rgba(0,0,0,.2)}
#toast.show{display:flex}
#toast.toast-err{background:#c0392b}

/* CICLO CARDS */
.ciclo-card{background:#fff;border:2px solid var(--linha);border-radius:var(--radius-lg);padding:16px 18px;transition:.15s;position:relative}
.ciclo-card.active{border-color:var(--laranja);background:var(--laranja-clr)}
.ciclo-card:hover{border-color:var(--laranja)}
.ciclo-card .status-dot{width:10px;height:10px;border-radius:50%;background:var(--linha);display:inline-block;margin-right:6px}
.ciclo-card.active .status-dot{background:var(--laranja)}
.ciclo-card .name{font-family:var(--font-display);font-size:16px;font-weight:600;color:var(--verde-esc);margin-bottom:4px}
.ciclo-card .meta{font-size:12px;color:var(--ink-soft)}
.ciclo-card .actions{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap}

/* USER CARDS */
.user-card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.user-card{background:#fff;border:1.5px solid var(--linha);border-radius:var(--radius-lg);padding:16px 18px}
.user-card:hover{border-color:var(--laranja)}
.user-card-head{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.user-card-avatar{width:38px;height:38px;border-radius:50%;background:var(--laranja);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;flex-shrink:0}
.user-card-name{font-weight:700;font-size:14px;color:var(--verde-esc)}
.user-card-role{font-size:11.5px;color:var(--ink-soft)}
.user-card-perms{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}

@media(max-width:900px){.sidebar{display:none}.main{margin-left:0}}

/* Toast info */
#toast.toast-info{background:var(--verde);}</style>
</head>

// Helpers
function fmtDate(iso){if(!iso)return"—";const[y,m,d]=iso.split("-");return d&&m&&y?`${d}/${m}/${y}`:iso;}
function addDays(iso,n){const d=new Date(iso);d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);}
function todayISO(){return new Date().toISOString().slice(0,10);}
function fmtNum(v,dec=1){if(v===null||v===undefined||isNaN(v))return"—";return v.toLocaleString("pt-BR",{minimumFractionDigits:dec,maximumFractionDigits:dec});}
function fmtPct(v,dec=0){if(v===null||v===undefined||isNaN(v))return"—";return(v*100).toLocaleString("pt-BR",{minimumFractionDigits:dec,maximumFractionDigits:dec})+"%";}
function statusBadge(s){const m={"Aguardando":"bc","Em processo":"bv","Atenção":"ba","Crítico":"br","Pronto p/ colheita":"baz","Colhido":"bm"};return`<span class="badge ${m[s]||"bc"}">${s}</span>`;}
function prazoBadge(dr){if(dr===null)return`<span class="badge bc">—</span>`;const c=dr<=5?"br":dr<=10?"ba":"bv";return`<span class="badge ${c}">${dr}d</span>`;}
function stageBar(p,l){

}


const Calc = {
  pesoLiqViagem(v){return(parseFloat(v.pesoBruto)||0)*(1-(parseFloat(v.umidade)||0));},
  viagensDaLeira(p,l){return STATE.viagens.filter(v=>v.patio===p&&v.leira===l);},
  resumoLev(p,l){
    const vs=this.viagensDaLeira(p,l);let pb=0,pliq=0;
    vs.forEach(v=>{pb+=parseFloat(v.pesoBruto)||0;pliq+=this.pesoLiqViagem(v);});
    return{nViagens:vs.length,pesoBruto:pb,pesoLiquido:pliq,umidMedia:pb>0?(1-pliq/pb):0};
  },
  pesoBase(p,l){const mo=STATE.taxas.materiaisOrganicos.taxa||0.8;return mo?this.resumoLev(p,l).pesoLiquido/mo:0;},
  qtdInsumo(p,l,key){
    const base=this.pesoBase(p,l);const t=STATE.taxas[key];if(!t||!base)return 0;
    let v=DOSE_TON.has(key)?(base/1000)*t.taxa:base*t.taxa;
    if(COM_UMIDADE.has(key)&&t.umidade<1)v=v/(1-t.umidade);
    return v;
  },
  enrCompleto(p,l){const base=this.pesoBase(p,l);const out={pesoBase:base};TAXA_ORDER.forEach(k=>{if(k!=="materiaisOrganicos")out[k]=this.qtdInsumo(p,l,k);});return out;},
  regsMon(p,l){return STATE.monitoramento.filter(m=>m.patio===p&&m.leira===l).sort((a,b)=>(a.data||"").localeCompare(b.data||""));},
  mediaTemp(m){const pts=[m.p1,m.p2,m.p3,m.p4].map(parseFloat).filter(v=>!isNaN(v));return pts.length?pts.reduce((a,b)=>a+b,0)/pts.length:null;},
  alertaTemp(med){if(med===null)return null;if(med<45)return{txt:"Fria",cls:"baz"};if(med>70)return{txt:"Crítica",cls:"br"};if(med>65)return{txt:"Alta",cls:"ba"};return{txt:"Ideal",cls:"bv"};},
  alertaPH(ph){const v=parseFloat(ph);if(isNaN(v))return null;if(v<6.5)return{txt:"Ácido",cls:"ba"};if(v>8)return{txt:"Alcalino",cls:"ba"};return{txt:"OK",cls:"bv"};},
  alertaUmid(u){const v=parseFloat(u);if(isNaN(v))return null;if(v<0.40)return{txt:"Seca",cls:"br"};if(v>0.60)return{txt:"Úmida",cls:"ba"};return{txt:"OK",cls:"bv"};},
  resumoMon(p,l){const rs=this.regsMon(p,l);const ts=rs.map(r=>this.mediaTemp(r)).filter(v=>v!==null);const phs=rs.map(r=>parseFloat(r.ph)).filter(v=>!isNaN(v));const us=rs.map(r=>parseFloat(r.umidade)).filter(v=>!isNaN(v));const avg=a=>a.length?a.reduce((x,y)=>x+y,0)/a.length:null;return{n:rs.length,tempMedia:avg(ts),tempMax:ts.length?Math.max(...ts):null,phMedio:avg(phs),umidMedia:avg(us),ultimaData:rs.length?rs[rs.length-1].data:null};},
  regsGas(p,l){return STATE.gases.filter(g=>g.patio===p&&g.leira===l).sort((a,b)=>(a.data||"").localeCompare(b.data||""));},
  mediaCO2(g){const pts=[g.co2a,g.co2b,g.co2c].map(parseFloat).filter(v=>!isNaN(v));return pts.length?pts.reduce((a,b)=>a+b,0)/pts.length:null;},
  resumoGas(p,l){const rs=this.regsGas(p,l);const avg=arr=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:null;return{n:rs.length,co2:avg(rs.map(r=>this.mediaCO2(r)).filter(v=>v!==null)),o2:avg(rs.map(r=>parseFloat(r.o2)).filter(v=>!isNaN(v))),nh3:avg(rs.map(r=>parseFloat(r.nh3)).filter(v=>!isNaN(v)))};},
  revsLeira(p,l){const k=leiraKey(p,l);return((STATE.revolvimento[k]||{}).entries||[]).filter(e=>e.data);},
  diasDesdeHoje(ini){if(!ini)return null;return Math.round((new Date()-new Date(ini))/86400000);},
  bioStatus(p,l,bioKey,ini){
    const key=leiraKey(p,l);const rec=(STATE.bioinsumos[key]||{})[bioKey];const aplicado=rec&&rec.data;
    const periodos={bioRaiz:[0,5],bioSolub:[10,15],bioRelease:[25,30],bioAZ:[40,45]};const[dmin,dmax]=periodos[bioKey];
    if(aplicado)return{status:"aplicado",label:"Aplicado em "+fmtDate(rec.data)};
    if(!ini)return{status:"aguardando",label:`Aguardar (dia ${dmin}–${dmax})`};
    const dias=this.diasDesdeHoje(ini);
    if(dias>=dmax)return{status:"atrasado",label:"Não aplicado!"};if(dias>=dmin)return{status:"aplicar",label:"Aplicar agora!"};
    return{status:"aguardando",label:`Aguardar (dia ${dmin}–${dmax})`};
  },
  etapasConcluidas(p,l){const et=((STATE.painel[leiraKey(p,l)]||{}).etapas)||{};let n=0;ETAPAS.forEach(e=>{if(et[e.key])n++;});return{count:n,total:ETAPAS.length,pct:n/ETAPAS.length};},
  dadosPainel(p,l){
    const key=leiraKey(p,l);const pan=STATE.painel[key]||{};const lev=STATE.levantamento[key]||{};
    const ini=lev.dataInicio||pan.dataInicio||null;const dias=this.diasDesdeHoje(ini);const dr=dias!==null?Math.max(0,PRAZO_DIAS-dias):null;
    const et=this.etapasConcluidas(p,l);const enr=this.enrCompleto(p,l);const pesoE=enr.pesoBase;
    const colh=STATE.colheita[key]||{};const pesoS=parseFloat(colh.peso);
    // Peso estimado na saída considerando umidade residual do produto
    const umidSaida=STATE.taxas.umidadeSaida?STATE.taxas.umidadeSaida.taxa:0.25;
    const pesoEstimado=(pesoE&&umidSaida<1)?pesoE/(1-umidSaida):null;
    let qkg=null,qpct=null,efic=null;
    if(!isNaN(pesoS)&&pesoE){qkg=pesoE-pesoS;qpct=qkg/pesoE;efic=pesoS/pesoE;}
    let status="Aguardando";
    if(!ini)status="Aguardando";else if(!isNaN(pesoS))status="Colhido";else if(et.count===6)status="Pronto p/ colheita";else if(dr!==null&&dr<=5)status="Crítico";else if(dr!==null&&dr<=10)status="Atenção";else status="Em processo";
    return{ini,dias,dr,et,pesoEntrada:pesoE,pesoSaida:isNaN(pesoS)?null:pesoS,pesoEstimado,umidSaida,quebraKg:qkg,quebraPct:qpct,eficiencia:efic,status,previsao:ini?addDays(ini,PRAZO_DIAS):null};
  },
  leirasAtivas(){const out=[];PATIOS.forEach(p=>LEIRAS.forEach(l=>{const lev=STATE.levantamento[leiraKey(p,l)];if(lev&&lev.dataInicio)out.push({patio:p,leira:l});}));return out;},
  panoramaPatio(patio){
    const ls=LEIRAS.filter(l=>{const lev=STATE.levantamento[leiraKey(patio,l)];return lev&&lev.dataInicio;});const total=ls.length;if(!total)return{total:0,enriq:0,bio:0,mon:0,col:0};
    let enriq=0,bio=0,mon=0,col=0;
    ls.forEach(l=>{const key=leiraKey(patio,l);const et=((STATE.painel[key]||{}).etapas)||{};if(et.enriquecimento)enriq++;if(et.monitoramento)mon++;const bd=STATE.bioinsumos[key]||{};if(BIOINSUMOS_DEF.every(b=>bd[b.key]&&bd[b.key].data))bio++;const colh=STATE.colheita[key]||{};if(!isNaN(parseFloat(colh.peso)))col++;});
    return{total,enriq:enriq/total,bio:bio/total,mon:mon/total,col:col/total};
  },
};



const DB = {

  /* ── CICLOS ── */
  async listCiclos(){
    const {data,error} = await sb.from('ciclos').select('*').order('criado_em',{ascending:false});
    if(error){console.error('listCiclos',error);return[];}
    return data||[];
  },
  async criarCiclo(nome,descricao,dataInicio){
    const {data,error} = await sb.from('ciclos').insert({nome,descricao,data_inicio:dataInicio,status:'ativo'}).select().single();
    if(error)throw error;
    return data;
  },
  async atualizarCiclo(id,campos){
    const {error} = await sb.from('ciclos').update({...campos,updated_at:new Date().toISOString()}).eq('id',id);
    if(error)throw error;

  async excluirCiclo(id){
    const {error} = await sb.from('ciclos').delete().eq('id',id);
    if(error)throw error;
  },

  /* ── CARREGAR CICLO COMPLETO ── */
  async carregarCiclo(cicloId){
    const [
      {data:viagens},{data:levRows},{data:monitoramento},{data:gases},
      {data:revRows},{data:bioRows},{data:aplRows},{data:painelRows},
      {data:colheitaRows},{data:taxasRows},{data:equipamentos},
      {data:combEntradas},{data:combSaidas}
    ] = await Promise.all([
      sb.from('viagens').select('*').eq('ciclo_id',cicloId),
      sb.from('levantamento').select('*').eq('ciclo_id',cicloId),
      sb.from('monitoramento').select('*').eq('ciclo_id',cicloId),
      sb.from('gases').select('*').eq('ciclo_id',cicloId),
      sb.from('revolvimento').select('*').eq('ciclo_id',cicloId),
      sb.from('bioinsumos').select('*').eq('ciclo_id',cicloId),
      sb.from('aplinsumos').select('*').eq('ciclo_id',cicloId),
      sb.from('painel').select('*').eq('ciclo_id',cicloId),
      sb.from('colheita').select('*').eq('ciclo_id',cicloId),
      sb.from('taxas').select('*').eq('ciclo_id',cicloId),
      sb.from('equipamentos').select('*').eq('ciclo_id',cicloId),
      sb.from('comb_entradas').select('*').eq('ciclo_id',cicloId),
      sb.from('comb_saidas').select('*').eq('ciclo_id',cicloId),
    ]);

    // Normalize levantamento: array → object keyed by patio|leira
    const levObj={};
    (levRows||[]).forEach(r=>{levObj[leiraKey(r.patio,r.leira)]={dataInicio:r.data_inicio,supervisor:r.supervisor,obs:r.obs,_id:r.id};});

    // revolvimento: array → object keyed by patio|leira with entries[]
    const revObj={};
    (revRows||[]).forEach(r=>{
      const k=leiraKey(r.patio,r.leira);
      if(!revObj[k])revObj[k]={entries:[]};
      revObj[k].entries.push({data:r.data,operador:r.operador,_id:r.id});
    });

    // bioinsumos → nested object
    const bioObj={};
    (bioRows||[]).forEach(r=>{
      const k=leiraKey(r.patio,r.leira);
      if(!bioObj[k])bioObj[k]={};
      bioObj[k][r.bio_key]={data:r.data,forma:r.forma,obs:r.obs,_id:r.id};
    });

    // aplinsumos → object
    const aplObj={};
    (aplRows||[]).forEach(r=>{
      aplObj[leiraKey(r.patio,r.leira)]={
        data:r.data,camaFrango:r.cama_frango,fosfatoNatural:r.fosfato_natural,
        ureia:r.ureia,kcl:r.kcl,map:r.map,outrosInsumos:r.outros_insumos,
        responsavel:r.responsavel,obs:r.obs,_id:r.id
      };
    });

    // painel → object
    const painelObj={};
    (painelRows||[]).forEach(r=>{
      painelObj[leiraKey(r.patio,r.leira)]={
        etapas:{levantamento:r.etapa_levantamento,enriquecimento:r.etapa_enriquecimento,
          insumos:r.etapa_insumos,monitoramento:r.etapa_monitoramento,
          gases:r.etapa_gases,revolvimento:r.etapa_revolvimento},
        gerente:r.gerente,_id:r.id
      };
    });

    // colheita → object
    const colheitaObj={};
    (colheitaRows||[]).forEach(r=>{
      colheitaObj[leiraKey(r.patio,r.leira)]={peso:r.peso,data:r.data,responsavel:r.responsavel,obs:r.obs,_id:r.id};
    });

    // taxas → object (merge with defaults)
    const taxasObj=JSON.parse(JSON.stringify(TAXAS_DEFAULT));
    (taxasRows||[]).forEach(r=>{
      if(taxasObj[r.chave]){taxasObj[r.chave].taxa=parseFloat(r.taxa)||0;if(r.umidade!==null)taxasObj[r.chave].umidade=parseFloat(r.umidade);}
    });

    // Normalize viagens
    const viagensNorm=(viagens||[]).map(v=>({
      id:v.id,patio:v.patio,leira:v.leira,data:v.data,hora:v.hora,
      placa:v.placa,ticket:v.ticket,fornecedor:v.fornecedor,tipoMP:v.tipo_mp,
      pesoBruto:v.peso_bruto,umidade:v.umidade,nome:v.nome
    }));

    // Normalize monitoramento
    const monNorm=(monitoramento||[]).map(m=>({
      id:m.id,patio:m.patio,leira:m.leira,data:m.data,
      p1:m.p1,p2:m.p2,p3:m.p3,p4:m.p4,ph:m.ph,umidade:m.umidade,aditivacao:m.aditivacao
    }));

    // Normalize gases
    const gasNorm=(gases||[]).map(g=>({
      id:g.id,patio:g.patio,leira:g.leira,data:g.data,
      co2a:g.co2a,co2b:g.co2b,co2c:g.co2c,o2:g.o2,co:g.co,ch4:g.ch4,
      h2s:g.h2s,nh3:g.nh3,atividade:g.atividade,recomendacao:g.recomendacao,
      diasProduto:g.dias_produto
    }));

    // Combustível
    const combObj={
      equipamentos:(equipamentos||[]).map(e=>({id:e.id,nome:e.nome,tipo:e.tipo,placa:e.placa,obs:e.obs})),
      entradas:(combEntradas||[]).map(e=>({id:e.id,data:e.data,litros:e.litros,fornecedor:e.fornecedor,nota:e.nota,obs:e.obs})),
      saidas:(combSaidas||[]).map(s=>({id:s.id,data:s.data,hora:s.hora,eqId:s.equipamento_id,litros:s.litros,horimetro:s.horimetro,operador:s.operador,obs:s.obs})),
    };

    return {
      viagens:viagensNorm,levantamento:levObj,monitoramento:monNorm,
      gases:gasNorm,revolvimento:revObj,bioinsumos:bioObj,aplinsumos:aplObj,
      painel:painelObj,colheita:colheitaObj,taxas:taxasObj,combustivel:combObj,
    };
  },

  async upsertLev(cicloId,patio,leira,campos){
    const existing=CD&&CD.levantamento&&CD.levantamento[leiraKey(patio,leira)];
    if(existing&&existing._id){
      await sb.from('levantamento').update({...DB._levMap(campos),updated_at:new Date().toISOString()}).eq('id',existing._id);

  /* ── REALTIME SUBSCRIPTION ── */
  subscriptions:[],
  subscribeToChanges(cicloId, callback){
    // Unsubscribe previous
    this.subscriptions.forEach(s=>sb.removeChannel(s));
    this.subscriptions=[];
    const tables=['viagens','levantamento','monitoramento','gases','revolvimento',
      'bioinsumos','aplinsumos','painel','colheita','taxas','equipamentos','comb_entradas','comb_saidas'];
    tables.forEach(table=>{
      const channel=sb.channel('realtime:'+table)
        .on('postgres_changes',{event:'*',schema:'public',table,filter:`ciclo_id=eq.${cicloId}`},
          payload=>{console.log('RT change:',table,payload.eventType);callback(table,payload);}
        ).subscribe();
      this.subscriptions.push(channel);
    });
    console.log('Realtime subscribed for ciclo',cicloId);
  },
};

const Ciclos = {
  async criar(nome, descricao, dataInicio){
    try{
      const ciclo = await DB.criarCiclo(nome, descricao, dataInicio);
      await this.switchTo(ciclo.id, ciclo);
      App.toast("Ciclo '"+nome+"' criado e ativado!");
      return ciclo;
    }catch(e){App.toast("Erro ao criar ciclo: "+e.message,"err");}
  },

  async switchTo(id, cicloObj){
    App.showLoading("Carregando ciclo...");
    try{
      const dados = await DB.carregarCiclo(id);
      const ciclo = cicloObj || (await sb.from('ciclos').select('*').eq('id',id).single()).data;
      CD = { id, nome: ciclo.nome, ...dados };
      META.cicloAtivo = id;
      saveMeta();
      // Subscribe to realtime changes
      DB.subscribeToChanges(id, async (table, payload) => {
        // On any change, reload that specific data
        await Ciclos._reloadTable(table);
        App.refresh();
        App.toast("🔄 Dados atualizados em tempo real","info");
      });
      this.updateSidebar();
      document.getElementById("cicloBadge").textContent = CD.nome;
    }catch(e){
      App.toast("Erro ao carregar ciclo: "+e.message,"err");
      console.error(e);
    }finally{
      App.hideLoading();
    }
  },

  async _reloadTable(table){
    if(!CD||!META.cicloAtivo)return;
    const id=META.cicloAtivo;
    try{
      if(table==='viagens'){const{data}=await sb.from('viagens').select('*').eq('ciclo_id',id);CD.viagens=(data||[]).map(v=>({id:v.id,patio:v.patio,leira:v.leira,data:v.data,hora:v.hora,placa:v.placa,ticket:v.ticket,fornecedor:v.fornecedor,tipoMP:v.tipo_mp,pesoBruto:v.peso_bruto,umidade:v.umidade,nome:v.nome}));}
      else if(table==='monitoramento'){const{data}=await sb.from('monitoramento').select('*').eq('ciclo_id',id);CD.monitoramento=(data||[]).map(m=>({id:m.id,patio:m.patio,leira:m.leira,data:m.data,p1:m.p1,p2:m.p2,p3:m.p3,p4:m.p4,ph:m.ph,umidade:m.umidade,aditivacao:m.aditivacao}));}
      else if(table==='gases'){const{data}=await sb.from('gases').select('*').eq('ciclo_id',id);CD.gases=(data||[]).map(g=>({id:g.id,patio:g.patio,leira:g.leira,data:g.data,co2a:g.co2a,co2b:g.co2b,co2c:g.co2c,o2:g.o2,co:g.co,ch4:g.ch4,h2s:g.h2s,nh3:g.nh3,atividade:g.atividade,recomendacao:g.recomendacao,diasProduto:g.dias_produto}));}
    }catch(e){console.error('_reloadTable',table,e);}
  },

  async updateSidebar(){
    try{
      const ciclos = await DB.listCiclos();
      const sel = document.getElementById("sidebarCicloSel");
      if(!sel)return;
      sel.innerHTML = ciclos.map(c=>
        `<option value="${c.id}" ${META.cicloAtivo===c.id?"selected":""}>${c.nome}${c.status==="encerrado"?" ✓":c.status==="arquivado"?" 📦":""}</option>`
      ).join("") || `<option value="">— nenhum ciclo —</option>`;
    }catch(e){console.error(e);}
  },

  async encerrar(id){
    const{data:c}=await sb.from('ciclos').select('nome').eq('id',id).single();
    if(!confirm(`Encerrar o ciclo "${c.nome}"?`))return;
    await DB.atualizarCiclo(id,{status:'encerrado',data_fim:todayISO()});
    App.toast("Ciclo encerrado.");App.navigate("ciclos");
  },

  async arquivar(id){
    const{data:c}=await sb.from('ciclos').select('nome').eq('id',id).single();
    if(!confirm(`Arquivar "${c.nome}"?`))return;
    await DB.atualizarCiclo(id,{status:'arquivado'});
    App.toast("Arquivado.");App.navigate("ciclos");
  },

  async excluir(id){
    const{data:c}=await sb.from('ciclos').select('nome').eq('id',id).single();
    if(!confirm(`EXCLUIR permanentemente "${c.nome}"?\nTodos os dados serão perdidos.`))return;
    await DB.excluirCiclo(id);
    if(META.cicloAtivo===id){META.cicloAtivo=null;CD=null;saveMeta();}
    App.toast("Ciclo excluído.");App.navigate("ciclos");
  },

  exportCicloAtual(){
    if(!CD){App.toast("Nenhum ciclo ativo","err");return;}
    const blob=new Blob([JSON.stringify({meta_export:true,ciclo:CD},null,2)],{type:"application/json"});
    const u=URL.createObjectURL(blob);const a=document.createElement("a");
    a.href=u;a.download="backup_"+CD.nome.replace(/\s/g,"_")+"_"+todayISO()+".json";
    a.click();URL.revokeObjectURL(u);App.toast("Backup exportado!");
  },

  importarBackup(){
    const inp=document.createElement("input");inp.type="file";inp.accept=".json";
    inp.onchange=async e=>{
      const f=e.target.files[0];if(!f)return;
      const r=new FileReader();r.onload=async ev=>{
        try{
          const data=JSON.parse(ev.target.result);
          App.toast("Importação via backup não disponível no modo Supabase. Use a migração.","info");
        }catch(err){App.toast("Arquivo inválido","err");}
      };r.readAsText(f);
    };inp.click();
  },
};

    await DB.upsertLev(META.cicloAtivo,patio,leira,CD.levantamento[key]);

    await DB.upsertApl(META.cicloAtivo,patio,leira,CD.aplinsumos[key]);

  async painel(patio,leira,campo,valor){
    const key=leiraKey(patio,leira);
    if(!CD.painel[key])CD.painel[key]={etapas:{}};
    if(campo==='etapa'){CD.painel[key].etapas[valor]=!CD.painel[key].etapas[valor];}
    else{CD.painel[key][campo]=valor;}
    await DB.upsertPainel(META.cicloAtivo,patio,leira,CD.painel[key]);
  },
  async colheita(patio,leira,campo,valor){
    const key=leiraKey(patio,leira);
    if(!CD.colheita[key])CD.colheita[key]={};
    CD.colheita[key][campo]=valor;
    await DB.upsertColheita(META.cicloAtivo,patio,leira,CD.colheita[key]);
  },
  async taxa(chave,field,valor){
    if(!CD.taxas[chave])return;
    CD.taxas[chave][field]=parseFloat(valor)||0;
    await DB.upsertTaxa(META.cicloAtivo,chave,CD.taxas[chave].taxa,CD.taxas[chave].umidade);

  async updEquip(id,eq){await DB.updEquipamento(id,eq);const i=CD.combustivel.equipamentos.findIndex(e=>e.id===id);if(i>=0)Object.assign(CD.combustivel.equipamentos[i],eq);},
  async delEquip(id){await DB.delEquipamento(id);CD.combustivel.equipamentos=CD.combustivel.equipamentos.filter(e=>e.id!==id);},
  async addCombEntrada(e){const id=await DB.addCombEntrada(META.cicloAtivo,e);e.id=id;CD.combustivel.entradas.push(e);},
  async delCombEntrada(id){await DB.delCombEntrada(id);CD.combustivel.entradas=CD.combustivel.entradas.filter(e=>e.id!==id);},
  async addCombSaida(s){const id=await DB.addCombSaida(META.cicloAtivo,s);s.id=id;CD.combustivel.saidas.push(s);},
  async delCombSaida(id){await DB.delCombSaida(id);CD.combustivel.saidas=CD.combustivel.saidas.filter(s=>s.id!==id);},
  async usuario(id,username,senha,role,customPages){
    await DB.salvarUsuario(id,username,senha,role,customPages);
    const users=await DB.listarUsuarios();META.users=users;
  },

};

const Pages = {};

Pages.ciclos = function(el){
  const ciclos = listCiclos();
  const statusLabel={ativo:"Em andamento",encerrado:"Encerrado",arquivado:"Arquivado"};
  const statusCls={ativo:"bv",encerrado:"bm",arquivado:"bc"};

  const stats = ciclos.map(c=>{
    // Count leiras with data in this ciclo
    const lev = c.levantamento||{};
    const nLeiras = Object.values(lev).filter(v=>v.dataInicio).length;
    const nViagens = (c.viagens||[]).length;
    return{...c, nLeiras, nViagens};
  });

  const cards = stats.length ? stats.map(c=>`
    <div class="ciclo-card ${META.cicloAtivo===c.id?"active":""}">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px">
        <div>
          <span class="status-dot"></span>
          <span class="name">${c.nome}</span>
          ${META.cicloAtivo===c.id?`<span class="badge bl" style="font-size:10px;margin-left:6px">ATIVO</span>`:""}
        </div>
        <span class="badge ${statusCls[c.status]||"bc"}">${statusLabel[c.status]||c.status}</span>
      </div>
      <div class="meta">${c.descricao||""}</div>
      <div style="display:flex;gap:16px;margin-top:8px;font-size:12px">
        <span><i class="ti ti-calendar" style="color:var(--laranja)"></i> Início: ${fmtDate(c.dataInicio)}</span>
        ${c.dataFim?`<span><i class="ti ti-flag"></i> Encerrado: ${fmtDate(c.dataFim)}</span>`:""}
        <span><i class="ti ti-stack-2" style="color:var(--verde)"></i> ${c.nLeiras} leiras · ${c.nViagens} viagens</span>
      </div>
      <div class="actions">
        ${META.cicloAtivo!==c.id?`<button class="btn btn-sm btn-primary" onclick="Ciclos.switchTo('${c.id}')"><i class="ti ti-toggle-right"></i> Ativar</button>`:`<span class="badge bl">Ciclo ativo</span>`}
        <button class="btn btn-sm" onclick="Pages._editCiclo('${c.id}')"><i class="ti ti-pencil"></i> Editar</button>
        <button class="btn btn-sm" onclick="Pages._exportCiclo('${c.id}')"><i class="ti ti-download"></i> Backup</button>
        ${c.status==="ativo"?`<button class="btn btn-sm" onclick="Ciclos.encerrar('${c.id}')"><i class="ti ti-flag"></i> Encerrar</button>`:""}
        ${c.status!=="arquivado"?`<button class="btn btn-sm" onclick="Ciclos.arquivar('${c.id}')"><i class="ti ti-archive"></i> Arquivar</button>`:""}
        <button class="btn btn-sm btn-danger" onclick="Ciclos.excluir('${c.id}')"><i class="ti ti-trash"></i></button>
      </div>
    </div>`) .join("") :
    `<div class="empty"><i class="ti ti-calendar-plus"></i><div class="title">Nenhum ciclo cadastrado</div><div>Clique em "Novo Ciclo" para começar</div></div>`;

  el.innerHTML=`
    <div class="info-bar info-azul" style="margin-bottom:16px">
      <i class="ti ti-info-circle"></i>
      <div><strong>Como funciona:</strong> Cada ciclo de produção tem seus próprios dados (leiras, viagens, monitoramentos, etc.) completamente isolados.
      Você pode ter quantos ciclos quiser — troque o ciclo ativo pelo seletor na barra lateral.
      Faça backup de cada ciclo separadamente para ter um histórico permanente.</div>
    </div>
    <div class="card">
      <div class="card-head">
        <div class="card-title"><i class="ti ti-calendar-stats"></i> Ciclos de Produção</div>
        <button class="btn btn-primary" onclick="Pages._novoCiclo()"><i class="ti ti-plus"></i> Novo Ciclo</button>
      </div>
      <div style="display:flex;flex-direction:column;gap:12px">${cards}</div>

    <div class="field-row">
      <div class="field"><label>Data de início</label><input type="date" id="ciclo-inicio" value="${todayISO()}"/></div>
      <div class="field"><label>Previsão de encerramento</label><input type="date" id="ciclo-fim"/></div>
    </div>`,()=>Pages._salvarCiclo());
};

Pages._novoCiclo=function(){
  document.getElementById("ciclo-id").value="";
  document.getElementById("ciclo-nome").value="";
  document.getElementById("ciclo-desc").value="";
  document.getElementById("ciclo-inicio").value=todayISO();
  document.getElementById("ciclo-fim").value="";
  App.openModal("modal-ciclo");
};
Pages._editCiclo=function(id){
  const c=loadCiclo(id);if(!c)return;
  document.getElementById("ciclo-id").value=c.id;
  document.getElementById("ciclo-nome").value=c.nome;
  document.getElementById("ciclo-desc").value=c.descricao||"";
  document.getElementById("ciclo-inicio").value=c.dataInicio||"";
  document.getElementById("ciclo-fim").value=c.dataFim||"";
  App.openModal("modal-ciclo");
};
Pages._salvarCiclo=async function(){
  const id=document.getElementById("ciclo-id").value;
  const nome=document.getElementById("ciclo-nome").value.trim();
  const desc=document.getElementById("ciclo-desc").value.trim();
  const ini=document.getElementById("ciclo-inicio").value;
  const fim=document.getElementById("ciclo-fim").value;
  if(!nome){App.toast('Informe o nome do ciclo','err');return;}try{if(id){await DB.atualizarCiclo(id,{nome,descricao:desc,data_inicio:ini||null,data_fim:fim||null});if(META.cicloAtivo===id&&CD)CD.nome=nome;App.toast('Ciclo atualizado!');}else{await Ciclos.criar(nome,desc,ini);}await Ciclos.updateSidebar();App.closeModal('modal-ciclo');App.navigate('ciclos');}catch(e){App.toast('Erro: '+e.message,'err');}
};
Pages._exportCiclo=function(id){
  const c=loadCiclo(id);if(!c)return;
  const blob=new Blob([JSON.stringify({meta_export:true,ciclo:c},null,2)],{type:"application/json"});
  const u=URL.createObjectURL(blob);const a=document.createElement("a");
  a.href=u;a.download="backup_"+c.nome.replace(/\s/g,"_")+"_"+todayISO()+".json";
  a.click();URL.revokeObjectURL(u);App.toast("Backup exportado!");
};

    document.querySelectorAll(".usr-page-cb").forEach(cb=>{
      cb.checked=pages.includes(cb.value);
    });
  },50);
  App.openModal("modal-user");
};
Pages._onRoleChange=function(){
  const role=document.getElementById("usr-role").value;
  const defaultPages=(ROLE_DEFS[role]||{}).pages||[];
  document.querySelectorAll(".usr-page-cb").forEach(cb=>{
    cb.checked=defaultPages.includes(cb.value);
  });
};

Pages._saveUser=async function(){
  const id=document.getElementById("usr-id").value;const user=document.getElementById("usr-user").value.trim();const senha=document.getElementById("usr-senha").value.trim();const role=document.getElementById("usr-role").value;
  if(!user||!senha){App.toast("Preencha usuário e senha","err");return;}
  if(senha.length<4){App.toast("Senha mínima de 4 caracteres","err");return;}
  // Collect selected pages
  const customPages=Array.from(document.querySelectorAll(".usr-page-cb:checked")).map(cb=>cb.value);
  if(id){
    const u=META.users.find(x=>x.id===id);
    if(u){u.user=user;u.senha=senha;u.role=role;u.customPages=customPages;}
  } else {
    META.users.push({id:uid(),user,senha,role,customPages});
  }
  saveMeta();App.closeModal("modal-user");App.navigate("usuarios");App.toast("Usuário salvo!");
};
Pages._delUser=async function(id){if(!confirm('Remover?'))return;await SB.delUsuario(id);App.navigate('usuarios');App.toast('Removido.');};

  const mLabels={camaFrango:"Cama Frango",fosfatoNatural:"Fosfato",ureia:"Ureia",kcl:"KCl",map:"MAP",outrosInsumos:"Outros"};
  const rows=ativas.map(({patio:p,leira:l})=>{
    const key=leiraKey(p,l);const enr=Calc.enrCompleto(p,l);const apl=STATE.aplinsumos[key]||{};
    const s=f=>`onchange="Pages._saveApl('${p}','${l}','${f}',this.value)"`;
    const tds=macros.map(k=>{const prev=enr[k];const aplic=parseFloat(apl[k])||0;const diff=prev-aplic;
      return`<td><input type="number" step="0.1" min="0" value="${apl[k]||""}" placeholder="${fmtNum(prev,0)}" ${s(k)} style="width:80px;text-align:right"/>
        <div style="font-size:10px;color:${diff<=0?"var(--verde)":"var(--laranja-esc)"}">prev: ${fmtNum(prev,0)}${diff>0?" | falta: "+fmtNum(diff,0):""}</div></td>`;}).join("");
    return`<tr><td><strong>${l}</strong><br><small style="color:var(--ink-soft)">${p}</small></td>
      <td><input type="date" value="${apl.data||""}" ${s("data")} style="width:120px"/></td>
      ${tds}
      <td><input value="${apl.responsavel||""}" ${s("responsavel")} placeholder="Nome" style="width:100px"/></td></tr>`;
  }).join("")||`<tr><td colspan="9"><div class="empty" style="padding:20px;text-align:center"><i class="ti ti-box"></i><div class="title">Sem leiras iniciadas</div></div></td></tr>`;
  el.innerHTML=`<div class="info-bar info-azul"><i class="ti ti-info-circle"></i> Informe as quantidades <strong>efetivamente aplicadas</strong>. O valor previsto aparece em cinza para referência.</div>
  <div class="card"><div class="card-head"><div class="card-title"><i class="ti ti-box"></i> Aplicação de Insumos por Leira</div></div>
    <div style="overflow-x:auto"><table style="font-size:12.5px"><thead><tr><th>Leira</th><th>Data aplic.</th>
      ${macros.map(k=>`<th>${mLabels[k]} (kg)</th>`).join("")}<th>Responsável</th></tr></thead><tbody>${rows}</tbody></table></div>
  </div>`;
};
Pages._saveApl=function(p,l,f,v){const key=leiraKey(p,l);if(!STATE.aplinsumos[key])STATE.aplinsumos[key]={};STATE.aplinsumos[key][f]=v;// auto-saved to Supabase};

/* ── BIOINSUMOS ── */

      <span class="badge ${cls}">${st.label}</span></div>

      </select></div>

  </div><div class="grid g2">${cards}</div>`;

Pages._saveBio=function(p,l,bk,f,v){const key=leiraKey(p,l);if(!STATE.bioinsumos[key])STATE.bioinsumos[key]={};if(!STATE.bioinsumos[key][bk])STATE.bioinsumos[key][bk]={};STATE.bioinsumos[key][bk][f]=v;// auto-saved to SupabaseApp.toast("Salvo!");};

/* ── MONITORAMENTO ── */

      <td class="num" style="font-weight:700;color:#c1502e">${med!==null?fmtNum(med,1)+"°C":"—"}</td>
      <td class="num">${m.ph||"—"}</td><td class="num">${m.umidade?fmtPct(parseFloat(m.umidade),0):"—"}</td>
      <td>${alT?`<span class="badge ${alT.cls}">${alT.txt}</span>`:"—"}</td>
      <td>${m.aditivacao||"—"}</td>

    </tr>`;}).join("")||`<tr><td colspan="12"><div class="empty" style="padding:24px;text-align:center"><i class="ti ti-thermometer"></i><div class="title">Nenhuma medição</div></div></td></tr>`;
  el.innerHTML=`<div class="info-bar info-verde"><i class="ti ti-info-circle"></i> Ideal: Temperatura 45–65°C · pH 6,5–8,0 · Umidade 40–60%</div>
  <div class="card"><div class="card-head"><div class="card-title"><i class="ti ti-thermometer"></i> Monitoramento</div><button class="btn btn-primary" onclick="Pages._openMon()"><i class="ti ti-plus"></i> Nova medição</button></div>
    <div class="table-wrap"><table><thead><tr><th>Leira</th><th>Data</th><th>P1°C</th><th>P2°C</th><th>P3°C</th><th>P4°C</th><th>Média</th><th>pH</th><th>Umid.</th><th>Alerta Temp</th><th>Aditivação</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
  </div>`;
  _modal("modal-mon","Nova Medição","ti-thermometer",`
    <div class="field-row"><div class="field"><label>Pátio</label><select id="mn-p">${PATIOS.map(p=>`<option>${p}</option>`).join("")}</select></div>
    <div class="field"><label>Leira</label><select id="mn-l">${LEIRAS.map(l=>`<option>${l}</option>`).join("")}</select></div></div>
    <div class="field"><label>Data</label><input type="date" id="mn-d" value="${todayISO()}"/></div>
    <div style="font-size:12px;font-weight:700;color:var(--ink-soft);margin:8px 0 4px">TEMPERATURA — 4 PONTOS (°C)</div>
    <div class="field-row3">
      <div class="field"><label>Ponto 1</label><input type="number" step="0.1" id="mn-p1" oninput="Pages._calcMed()"/></div>
      <div class="field"><label>Ponto 2</label><input type="number" step="0.1" id="mn-p2" oninput="Pages._calcMed()"/></div>
      <div class="field"><label>Ponto 3</label><input type="number" step="0.1" id="mn-p3" oninput="Pages._calcMed()"/></div>
    </div>
    <div class="field-row"><div class="field"><label>Ponto 4</label><input type="number" step="0.1" id="mn-p4" oninput="Pages._calcMed()"/></div>
    <div class="field"><label>Média calculada</label><input id="mn-med" readonly style="background:var(--verde-clr);font-weight:700;color:var(--verde-esc)"/></div></div>
    <div id="mn-alerta" style="margin-bottom:8px"></div>
    <div class="field-row"><div class="field"><label>pH</label><input type="number" step="0.1" id="mn-ph" placeholder="7.0"/></div>
    <div class="field"><label>Umidade (0–1)</label><input type="number" step="0.01" id="mn-um" placeholder="0.55"/></div></div>
    <div class="field"><label>Aditivação?</label><select id="mn-ad"><option value="">—</option><option>Sim</option><option>Não</option></select></div>`,
  ()=>Pages._saveMon());
};
Pages._calcMed=function(){const pts=[1,2,3,4].map(i=>parseFloat(document.getElementById("mn-p"+i).value)).filter(v=>!isNaN(v));if(!pts.length){document.getElementById("mn-med").value="";document.getElementById("mn-alerta").innerHTML="";return;}const m=pts.reduce((a,b)=>a+b,0)/pts.length;document.getElementById("mn-med").value=fmtNum(m,1)+" °C";const al=Calc.alertaTemp(m);document.getElementById("mn-alerta").innerHTML=al?`<span class="badge ${al.cls}">${al.txt}</span>`:"";};
Pages._openMon=()=>App.openModal("modal-mon");
Pages._saveMon=async function(){
  const m={id:uid(),patio:document.getElementById("mn-p").value,leira:document.getElementById("mn-l").value,
    data:document.getElementById("mn-d").value,p1:document.getElementById("mn-p1").value,p2:document.getElementById("mn-p2").value,
    p3:document.getElementById("mn-p3").value,p4:document.getElementById("mn-p4").value,
    ph:document.getElementById("mn-ph").value,umidade:document.getElementById("mn-um").value,aditivacao:document.getElementById("mn-ad").value};
  if(!m.data){App.toast("Informe a data","err");return;}
  STATE.monitoramento.push(m);// auto-saved to SupabaseApp.closeModal("modal-mon");App.navigate("monitoramento");App.toast("Medição registrada!");
};
Pages._delMon=function(id){if(!confirm("Remover?"))return;STATE.monitoramento=STATE.monitoramento.filter(m=>m.id!==id);// auto-saved to SupabaseApp.navigate("monitoramento");};

/* ── COLHEITA / SAÍDA ── */
Pages.colheita = function(el){
  if(!CD){el.innerHTML=`<div class="empty"><i class="ti ti-plant"></i><div class="title">Nenhum ciclo ativo</div></div>`;return;}
  const ativas=Calc.leirasAtivas();
  const umidSaida=STATE.taxas.umidadeSaida?STATE.taxas.umidadeSaida.taxa:0.25;

  const rows=ativas.map(({patio:p,leira:l})=>{
    const key=leiraKey(p,l);const colh=STATE.colheita[key]||{};const dp=Calc.dadosPainel(p,l);
    const s=f=>`onchange="Pages._saveColh('${p}','${l}','${f}',this.value)"`;
    const estim=dp.pesoEstimado;
    return`<tr>
      <td><strong>${l}</strong><br><small style="color:var(--ink-soft)">${p}</small></td>
      <td class="num">${fmtNum(dp.pesoEntrada,0)} kg</td>
      <td class="calc">${estim!==null?fmtNum(estim,0)+" kg":"—"}</td>
      <td><input type="number" step="0.1" min="0" value="${colh.peso||""}" placeholder="kg" ${s("peso")} style="width:100px;text-align:right"/></td>
      <td><input type="date" value="${colh.data||""}" ${s("data")} style="width:130px"/></td>
      <td class="${dp.quebraKg!==null&&dp.quebraKg<0?"calc":"num"}">${dp.quebraKg!==null?fmtNum(dp.quebraKg,0)+" kg":"—"}</td>
      <td class="num">${dp.quebraPct!==null?fmtPct(dp.quebraPct,1):"—"}</td>
      <td class="num" style="font-weight:700;color:var(--laranja-esc)">${dp.eficiencia!==null?fmtPct(dp.eficiencia,1):"—"}</td>
      <td><input value="${colh.responsavel||""}" ${s("responsavel")} placeholder="Nome" style="width:110px"/></td>
      <td><input value="${colh.obs||""}" ${s("obs")} placeholder="Obs." style="width:110px"/></td>
    </tr>`;
  }).join("")||`<tr><td colspan="10"><div class="empty" style="padding:20px;text-align:center"><i class="ti ti-plant"></i><div class="title">Sem leiras iniciadas</div><div>Registre levantamento primeiro</div></div></td></tr>`;

  const totalEntrada=ativas.reduce((s,{patio:p,leira:l})=>s+Calc.dadosPainel(p,l).pesoEntrada,0);
  const totalEstimado=ativas.reduce((s,{patio:p,leira:l})=>{const e=Calc.dadosPainel(p,l).pesoEstimado;return s+(e||0);},0);
  const totalSaida=ativas.reduce((s,{patio:p,leira:l})=>{const ps=Calc.dadosPainel(p,l).pesoSaida;return s+(ps||0);},0);

  el.innerHTML=`
    <div class="grid g4" style="margin-bottom:16px">
      <div class="metric m-marrom"><div class="label">Peso entrada total (base seco)</div><div class="value" style="font-size:18px">${fmtNum(totalEntrada,0)} kg</div></div>
      <div class="metric m-verde"><div class="label">Peso estimado saída (${fmtPct(umidSaida,0)} umid.)</div><div class="value" style="font-size:18px;color:var(--verde)">${fmtNum(totalEstimado,0)} kg</div></div>
      <div class="metric m-laranja"><div class="label">Peso saída registrado</div><div class="value" style="font-size:18px">${fmtNum(totalSaida,0)} kg</div></div>
      <div class="metric m-${totalEstimado>0&&totalSaida>0?"verde":"marrom"}"><div class="label">Eficiência média</div><div class="value" style="font-size:18px">${totalEntrada>0&&totalSaida>0?fmtPct(totalSaida/totalEstimado,1):"—"}</div></div>
    </div>
    <div class="info-bar info-verde">
      <i class="ti ti-info-circle"></i>
      <div><strong>Fórmula:</strong> Peso Estimado = Peso Base ÷ (1 − Umidade de Saída).
      Umidade de saída atual: <strong>${fmtPct(umidSaida,0)}</strong>
      — configure em <a onclick="App.navigate('taxas')" style="cursor:pointer;color:var(--verde-esc);font-weight:700">Taxas de Enriquecimento</a>.</div>
    </div>
    <div class="card"><div class="card-head">
      <div class="card-title"><i class="ti ti-plant"></i> Colheita / Saída por Leira</div>
    </div>
    <div style="overflow-x:auto"><table style="font-size:12px"><thead><tr>
      <th>Leira</th>
      <th>Peso Entrada<br><small style="font-weight:400;text-transform:none">(base seco)</small></th>
      <th style="background:var(--verde);color:#fff">Peso Estimado Saída<br><small style="font-weight:400;text-transform:none">÷ (1 − ${fmtPct(umidSaida,0)})</small></th>

      <th>Data Colheita</th>
      <th>Quebra (kg)</th>
      <th>Quebra (%)</th>
      <th>Eficiência</th>
      <th>Responsável</th>

Pages._saveColh=function(p,l,f,v){
  const key=leiraKey(p,l);
  if(!STATE.colheita[key])STATE.colheita[key]={};
  STATE.colheita[key][f]=v;
  // auto-saved to Supabase
  // Refresh just the row metrics without full re-render
  App.navigate("colheita");
};

/* ── TAXAS ── */
Pages.taxas = function(el){
  const usT = STATE.taxas.umidadeSaida || {taxa:0.25};
  const pesoExemplo = 63717;
  const estimEx = pesoExemplo / (1 - usT.taxa);

  // Rows: skip umidadeSaida (it has its own card above)
  const rows = TAXA_ORDER.filter(k=>k!=="umidadeSaida").map(k=>{
    const t=STATE.taxas[k];if(!t)return"";
    const isMO=k==="materiaisOrganicos";const isTon=DOSE_TON.has(k);
    return`<tr ${isMO?'style="background:var(--verde-clr)"':""}>
      <td><strong>${TAXA_LABELS[k]}</strong>
        ${isMO?`<span class="badge bv" style="font-size:10px">BASE</span>`:""}
      </td>
      <td style="font-size:11.5px;color:var(--ink-soft)">${t.unidade}</td>
      <td>
        <input type="number" step="${isTon?"0.01":"0.001"}" min="0" max="${isTon?"1000":"1"}"
          value="${t.taxa}" onchange="Pages._saveTaxa('${k}','taxa',this.value)"
          style="width:90px;text-align:right"/>
        ${!isMO&&!isTon?`<span style="font-size:11px;color:var(--ink-soft)"> (${fmtPct(t.taxa,1)})</span>`:""}
      </td>
      <td>${t.umidade!==null
        ?`<input type="number" step="0.01" min="0" max="0.99" value="${t.umidade}"
            onchange="Pages._saveTaxa('${k}','umidade',this.value)"
            style="width:80px;text-align:right"/>
           <span style="font-size:11px;color:var(--ink-soft)"> (${fmtPct(t.umidade,0)})</span>`
        :`<span style="color:var(--ink-soft)">—</span>`}
      </td>
      <td style="font-size:12px;color:var(--ink-soft)">${t.obs||""}</td>
    </tr>`;
  }).join("");

  el.innerHTML=`
    <!-- ── UMIDADE DE SAÍDA — card destacado ─────────────────── -->
    <div class="card" style="margin-bottom:16px;border:2px solid var(--laranja)">
      <div class="card-head">
        <div class="card-title"><i class="ti ti-droplet"></i> Umidade do Produto na Saída</div>
        <span class="badge bl">Afeta o Peso Estimado na Colheita</span>
      </div>
      <div class="grid g2" style="gap:16px;align-items:flex-start">
        <div>
          <div class="info-bar info-laranja" style="margin-bottom:12px">
            <i class="ti ti-info-circle"></i>
            <div>O composto não sai com 0% de umidade. Informe aqui a umidade residual típica do produto acabado.
            Isso ajusta o <strong>Peso Estimado de Saída</strong> na aba Colheita.<br>
            <strong>Fórmula:</strong> Peso Estimado = Peso Base ÷ (1 − Umidade de Saída)</div>
          </div>
          <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
            <div>
              <div style="font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;margin-bottom:6px">Umidade de saída</div>
              <div style="display:flex;align-items:center;gap:10px">
                <input type="range" id="umidSaidaSlider" min="0" max="60" step="1"
                  value="${Math.round(usT.taxa*100)}"
                  oninput="Pages._onUmidSaidaChange(this.value)"
                  style="width:160px;accent-color:var(--laranja)"/>
                <div style="font-size:28px;font-weight:700;color:var(--laranja);min-width:60px" id="umidSaidaVal">
                  ${fmtPct(usT.taxa,0)}
                </div>
                <input type="number" min="0" max="60" step="1"
                  value="${Math.round(usT.taxa*100)}" id="umidSaidaNum"
                  oninput="Pages._onUmidSaidaChange(this.value)"
                  style="width:70px;font-size:14px;text-align:center;padding:6px;border:1.5px solid var(--linha);border-radius:8px"/>
                <span style="font-size:14px;color:var(--ink-soft)">%</span>
              </div>
            </div>
          </div>
        </div>
        <div style="background:var(--laranja-clr);border-radius:12px;padding:16px;border:1px solid var(--laranja)">
          <div style="font-size:11px;font-weight:700;color:var(--laranja-esc);text-transform:uppercase;margin-bottom:8px">
            Exemplo de cálculo
          </div>
          <div style="font-size:13px;color:var(--ink);margin-bottom:6px">
            Peso de entrada (base seco): <strong>63.717 kg</strong>
          </div>
          <div style="font-size:13px;color:var(--ink);margin-bottom:6px">
            Umidade de saída: <strong id="exUmid">${fmtPct(usT.taxa,0)}</strong>
          </div>
          <div style="font-size:12px;color:var(--ink-soft);margin-bottom:8px;font-style:italic">
            63.717 ÷ (1 − <span id="exUmidNum">${usT.taxa.toFixed(2)}</span>) =
          </div>
          <div style="font-size:24px;font-weight:700;color:var(--laranja-esc)" id="exResult">
            ${fmtNum(estimEx,0)} kg
          </div>
          <div style="font-size:11px;color:var(--laranja-esc);margin-top:4px">peso estimado de saída</div>
        </div>
      </div>
    </div>

    <!-- ── TAXAS DE ENRIQUECIMENTO ────────────────────────────── -->
    <div class="card">
      <div class="card-head">
        <div class="card-title"><i class="ti ti-settings"></i> Taxas de Enriquecimento</div>
        <button class="btn btn-sm" onclick="Pages._resetTaxas()"><i class="ti ti-refresh"></i> Restaurar padrões</button>
      </div>
      <div class="info-bar info-laranja">
        <i class="ti ti-alert-triangle"></i>
        Taxas válidas para <strong>todas as leiras do ciclo</strong>. &nbsp;
        Macro: Qtd = (Base × Taxa) ÷ (1−Umidade) &nbsp;·&nbsp; Bio: Qtd = (Base÷1000) × Dose/ton
      </div>
      <div class="table-wrap"><table>
        <thead><tr>
          <th>Insumo</th><th>Unidade</th><th>Taxa / Dose</th><th>Umidade do Insumo</th><th>Obs.</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table></div>
    </div>`;
};

Pages._onUmidSaidaChange=function(val){
  const v=Math.min(60,Math.max(0,parseFloat(val)||0));
  const dec=v/100;
  // Sync slider and number input
  const sl=document.getElementById("umidSaidaSlider");
  const nm=document.getElementById("umidSaidaNum");
  if(sl&&parseFloat(sl.value)!==v)sl.value=v;
  if(nm&&parseFloat(nm.value)!==v)nm.value=v;
  // Update display
  const vEl=document.getElementById("umidSaidaVal");
  const exU=document.getElementById("exUmid");
  const exUN=document.getElementById("exUmidNum");
  const exR=document.getElementById("exResult");
  if(vEl)vEl.textContent=v+"%";
  if(exU)exU.textContent=v+"%";
  if(exUN)exUN.textContent=dec.toFixed(2);
  if(exR)exR.textContent=dec<1?fmtNum(63717/(1-dec),0)+" kg":"∞";
  // Save to STATE
  Pages._saveTaxa("umidadeSaida","taxa",dec);
};
Pages._saveTaxa=function(k,f,v){STATE.taxas[k][f]=parseFloat(v)||0;// auto-saved to SupabaseApp.toast("Taxa salva!");};
Pages._resetTaxas=function(){if(!confirm("Restaurar padrões?"))return;STATE.taxas=JSON.parse(JSON.stringify(TAXAS_DEFAULT));// auto-saved to SupabaseApp.navigate("taxas");App.toast("Taxas restauradas!");};

/* ── RELATÓRIO / PDF ── */
Pages.relatorio = function(el){
  if(!CD){
    el.innerHTML=`<div class="empty"><i class="ti ti-file-text"></i><div class="title">Nenhum ciclo ativo</div></div>`;
    return;
  }
  const ativas=Calc.leirasAtivas();
  const leiraOpts=ativas.map(({patio:p,leira:l})=>`<option value="${leiraKey(p,l)}">${l} — ${p}</option>`).join("");
  const comb=CD.combustivel||{entradas:[],saidas:[],equipamentos:[]};
  const totE=comb.entradas.reduce((s,e)=>s+(parseFloat(e.litros)||0),0);
  const totS=comb.saidas.reduce((s,e)=>s+(parseFloat(e.litros)||0),0);
  const saldo=totE-totS;

  el.innerHTML=`
    <div class="grid g2" style="gap:20px;margin-bottom:20px">
      <div class="card">
        <div class="card-head"><div class="card-title"><i class="ti ti-clipboard-list"></i> Relatório de Leira</div><span class="badge bv">${ativas.length} ativas</span></div>
        <p style="font-size:13px;color:var(--ink-soft);margin-bottom:16px">Resumo completo: levantamento, enriquecimento, monitoramento, gases, bioinsumos e eficiência. Com logo e cores da Organo Pará.</p>
        <div class="field"><label>Selecione a leira</label>
          <select id="rel-leira-sel"><option value="">— selecione —</option>${leiraOpts}</select>
        </div>
        <button class="btn btn-primary" style="width:100%;margin-top:10px" onclick="Pages._gerarRelLeira()">
          <i class="ti ti-eye"></i> Visualizar relatório da leira
        </button>
      </div>
      <div class="card">
        <div class="card-head"><div class="card-title"><i class="ti ti-droplet"></i> Relatório de Combustível</div>
          <span class="badge ${saldo<200?"br":saldo<500?"ba":"bv"}">${saldo<200?"⚠ Estoque baixo":saldo<500?"Atenção":"OK"}</span>
        </div>
        <p style="font-size:13px;color:var(--ink-soft);margin-bottom:14px">Saldo do tanque, consumo por equipamento e histórico completo de entradas e saídas.</p>
        <div class="grid g3" style="gap:8px;margin-bottom:14px">
          <div class="metric m-verde" style="padding:10px 12px"><div class="label">Entradas</div><div class="value" style="font-size:18px">${fmtNum(totE,1)} L</div></div>
          <div class="metric m-laranja" style="padding:10px 12px"><div class="label">Saídas</div><div class="value" style="font-size:18px">${fmtNum(totS,1)} L</div></div>
          <div class="metric m-${saldo<200?"marrom":"verde"}" style="padding:10px 12px"><div class="label">Saldo</div><div class="value" style="font-size:18px;color:${saldo<200?"#c0392b":"var(--verde)"}">${fmtNum(saldo,1)} L</div></div>
        </div>
        <button class="btn btn-primary" style="width:100%" onclick="Pages._gerarRelCombustivel()">
          <i class="ti ti-eye"></i> Visualizar relatório de combustível
        </button>
      </div>
    </div>
    <div id="rel-prev"></div>`;
};
