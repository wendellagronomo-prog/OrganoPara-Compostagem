/* ═══ GERAR PDF: LEIRA ═══ */
Pages._gerarRelLeira=function(){
  const sel=document.getElementById("rel-leira-sel").value;
  if(!sel){App.toast("Selecione uma leira","err");return;}
  const[patio,leira]=sel.split("|");
  const dp=Calc.dadosPainel(patio,leira);
  const lev=Calc.resumoLev(patio,leira);
  const enr=Calc.enrCompleto(patio,leira);
  const monRegs=Calc.regsMon(patio,leira);
  const gasRegs=Calc.regsGas(patio,leira);
  const key=leiraKey(patio,leira);
  const bd=STATE.bioinsumos[key]||{};
  const levD=STATE.levantamento[key]||{};

  const G="#2d6a4f";const L="#e07b2a";const GD="#1b4332";
  const sec=(title,color=G)=>`<div style="font-size:11px;text-transform:uppercase;letter-spacing:.07em;font-weight:700;color:${color};margin:18px 0 8px;padding-bottom:5px;border-bottom:2px solid ${color}22">${title}</div>`;
  const kpi=(l2,v,s="",accent=G)=>`<div style="background:#f8f5f0;border-radius:8px;padding:10px 12px;border-left:3px solid ${accent}">
    <div style="font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:#7a6250;margin-bottom:3px">${l2}</div>
    <div style="font-size:17px;font-weight:700;color:#2b1d12">${v}</div>
    ${s?`<div style="font-size:10px;color:#9a8270;margin-top:2px">${s}</div>`:""}
  </div>`;
  const th=`style="padding:8px 10px;background:${G};color:#fff;text-align:left;font-size:11px"`;
  const thR=`style="padding:8px 10px;background:${G};color:#fff;text-align:right;font-size:11px"`;

  const etHTML=ETAPAS.map(e=>{
    const done=((STATE.painel[key]||{}).etapas||{})[e.key];
    return`<span style="display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:11.5px;margin:2px;
      background:${done?"#d8f3dc":"#f3f4f6"};color:${done?GD:"#6b7280"};font-weight:600;border:1px solid ${done?"#95d5b2":"#ddd"}">
      ${done?`<span style="color:${G}">✓</span>`:""} ${e.label}</span>`;
  }).join("");

  const monTbl=monRegs.map((m,i)=>{
    const med=Calc.mediaTemp(m);const al=Calc.alertaTemp(med);
    const bg=i%2===0?"#fff":"#faf8f5";
    return`<tr style="background:${bg}">
      <td style="padding:5px 8px">${fmtDate(m.data)}</td>
      <td style="padding:5px 8px;text-align:right">${m.p1||"—"}</td>
      <td style="padding:5px 8px;text-align:right">${m.p2||"—"}</td>
      <td style="padding:5px 8px;text-align:right">${m.p3||"—"}</td>
      <td style="padding:5px 8px;text-align:right">${m.p4||"—"}</td>
      <td style="padding:5px 8px;text-align:right;font-weight:700;color:#c1502e">${med!==null?fmtNum(med,1)+"°C":"—"}</td>
      <td style="padding:5px 8px;text-align:right">${m.ph||"—"}</td>
      <td style="padding:5px 8px;text-align:right">${m.umidade?fmtPct(parseFloat(m.umidade),0):"—"}</td>
    </tr>`;
  }).join("")||`<tr><td colspan="8" style="padding:12px;text-align:center;color:#888">Sem registros</td></tr>`;

  const gasTbl=gasRegs.map((g,i)=>{
    const co2m=Calc.mediaCO2(g);const bg=i%2===0?"#fff":"#faf8f5";
    return`<tr style="background:${bg}">
      <td style="padding:5px 8px">${fmtDate(g.data)}</td>
      <td style="padding:5px 8px;text-align:right">${co2m!==null?fmtNum(co2m,1)+"%":"—"}</td>
      <td style="padding:5px 8px;text-align:right">${g.o2||"—"}%</td>
      <td style="padding:5px 8px;text-align:right">${g.ch4||"—"}%</td>
      <td style="padding:5px 8px;text-align:right">${g.nh3||"—"} ppm</td>
      <td style="padding:5px 8px">${g.recomendacao||"—"}</td>
    </tr>`;
  }).join("")||`<tr><td colspan="6" style="padding:12px;text-align:center;color:#888">Sem registros</td></tr>`;

  const bioTbl=BIOINSUMOS_DEF.map((b,i)=>{
    const rec=bd[b.key]||{};const st=Calc.bioStatus(patio,leira,b.key,levD.dataInicio);
    const stColor={aplicado:G,aplicar:L,atrasado:"#c0392b",aguardando:"#888"}[st.status]||"#888";
    const bg=i%2===0?"#fff":"#faf8f5";
    return`<tr style="background:${bg}">
      <td style="padding:5px 8px"><strong>${b.nome}</strong> <small style="color:#888">${b.periodo}</small></td>
      <td style="padding:5px 8px;text-align:right">${fmtNum(Calc.qtdInsumo(patio,leira,b.key),2)} L</td>
      <td style="padding:5px 8px">${fmtDate(rec.data)}</td>
      <td style="padding:5px 8px">${rec.forma||"—"}</td>
      <td style="padding:5px 8px"><span style="background:${stColor}22;color:${stColor};padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600">${st.label}</span></td>
    </tr>`;
  }).join("");

  const enrGrid=[["Cama Frango",enr.camaFrango,"kg",L],["Fosfato Natural",enr.fosfatoNatural,"kg",G],
    ["Ureia",enr.ureia,"kg",G],["KCl",enr.kcl,"kg",G],["MAP",enr.map,"kg",G],
    ["Bio RAIZ",enr.bioRaiz,"L","#52b788"],["Bio Solubilize",enr.bioSolub,"L","#52b788"],
    ["Bio Release",enr.bioRelease,"L","#52b788"],["Bio AZ",enr.bioAZ,"L","#52b788"],
    ["Bokashi",enr.bokashi,"kg",G],["Triko Soil",enr.trikoSoil,"kg",G],["Outros",enr.outrosInsumos,"kg",G]
  ].map(([l2,v,u,ac])=>
    `<div style="background:#f8f5f0;border-radius:6px;padding:7px 10px;border-left:3px solid ${ac}">
      <div style="font-size:9px;color:#7a6250;text-transform:uppercase">${l2}</div>
      <div style="font-size:13px;font-weight:700;color:#2b1d12">${v>0?fmtNum(v,2)+" "+u:"—"}</div>
    </div>`).join("");

  const statusColor={Aguardando:"#888","Em processo":G,Atenção:L,Crítico:"#c0392b","Pronto p/ colheita":"#3a7ca5",Colhido:"#4a3728"}[dp.status]||"#888";

  const content=`
    ${Pages._cabecalhoPDF("Relatório de Leira — "+leira)}
    <div class="page-body">
      <!-- identif -->
      <div style="display:flex;gap:24px;flex-wrap:wrap;padding:14px 0;border-bottom:2px solid #e8ddd2;margin-bottom:14px">
        <div><div style="font-size:9px;text-transform:uppercase;color:#7a6250;letter-spacing:.08em">Leira</div><div style="font-size:28px;font-weight:700;color:${GD}">${leira}</div></div>
        <div style="display:flex;flex-direction:column;justify-content:flex-end;padding-bottom:4px">
          <div style="font-size:13px;font-weight:600;color:#2b1d12">${patio}</div>
          <div style="font-size:11px;color:#7a6250">Início: ${fmtDate(dp.ini)} &nbsp;·&nbsp; Previsão: ${fmtDate(dp.previsao)}</div>
        </div>
        <div style="margin-left:auto;display:flex;align-items:center">
          <div style="background:${statusColor}22;color:${statusColor};padding:7px 18px;border-radius:20px;font-size:14px;font-weight:700;border:2px solid ${statusColor}55">${dp.status}</div>
        </div>
      </div>

      <!-- kpis -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:4px">
        ${kpi("Dias em processo",dp.dias!==null?dp.dias+"d":"—","",G)}
        ${kpi("Dias restantes",dp.dr!==null?dp.dr+"d":"—","meta: "+PRAZO_DIAS+"d",dp.dr!==null&&dp.dr<=10?"#c0392b":G)}
        ${kpi("Etapas",dp.et.count+"/"+dp.et.total,"concluídas",L)}
        ${kpi("Supervisor",levD.supervisor||"—","",G)}
      </div>

      ${sec("Etapas do Processo")}
      <div style="margin-bottom:4px">${etHTML}</div>

      ${sec("Levantamento de Matéria-Prima")}
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
        ${kpi("Viagens",lev.nViagens,"",G)}
        ${kpi("Peso bruto",fmtNum(lev.pesoBruto,0)+" kg","",G)}
        ${kpi("Peso líquido",fmtNum(lev.pesoLiquido,0)+" kg","base seco",G)}
        ${kpi("Umidade média",fmtPct(lev.umidMedia,1),"",L)}
      </div>

      ${sec("Enriquecimento — Peso base: "+fmtNum(enr.pesoBase,0)+" kg")}
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px">${enrGrid}</div>

      ${monRegs.length?`
      ${sec("Monitoramento ("+monRegs.length+" medições)")}
      <table style="width:100%;border-collapse:collapse;font-size:12px;border-radius:8px;overflow:hidden">
        <thead><tr>
          <th ${th}>Data</th><th ${thR}>P1°C</th><th ${thR}>P2°C</th><th ${thR}>P3°C</th><th ${thR}>P4°C</th>
          <th ${thR}>Média</th><th ${thR}>pH</th><th ${thR}>Umidade</th>
        </tr></thead><tbody>${monTbl}</tbody>
      </table>`:""}

      ${gasRegs.length?`
      ${sec("Aferição de Gases ("+gasRegs.length+" registros)")}
      <table style="width:100%;border-collapse:collapse;font-size:12px;border-radius:8px;overflow:hidden">
        <thead><tr>
          <th ${th}>Data</th><th ${thR}>CO₂ méd.</th><th ${thR}>O₂</th><th ${thR}>CH₄</th><th ${thR}>NH₃</th><th ${th}>Recomendação</th>
        </tr></thead><tbody>${gasTbl}</tbody>
      </table>`:""}

      ${sec("Bioinsumos Aplicados")}
      <table style="width:100%;border-collapse:collapse;font-size:12px;border-radius:8px;overflow:hidden">
        <thead><tr>
          <th ${th}>Biológico</th><th ${thR}>Dose prev.</th><th ${th}>Data aplic.</th><th ${th}>Forma</th><th ${th}>Status</th>
        </tr></thead><tbody>${bioTbl}</tbody>
      </table>

      ${sec("Eficiência e Colheita","#4a3728")}
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
        ${kpi("Revolvimentos",Calc.revsLeira(patio,leira).length,"realizados",G)}
        ${kpi("Peso entrada (base seco)",fmtNum(dp.pesoEntrada,0)+" kg","peso base",G)}
        ${kpi("Peso estimado saída",dp.pesoEstimado!==null?fmtNum(dp.pesoEstimado,0)+" kg":"—","÷ (1−"+fmtPct(dp.umidSaida,0)+")",L)}
        ${kpi("Peso saída real",dp.pesoSaida!==null?fmtNum(dp.pesoSaida,0)+" kg":"Não colhido","",G)}
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px">
        ${kpi("Quebra técnica (kg)",dp.quebraKg!==null?fmtNum(dp.quebraKg,0)+" kg":"—","",L)}
        ${kpi("Quebra técnica (%)",dp.quebraPct!==null?fmtPct(dp.quebraPct,1):"—","",L)}
        ${kpi("Eficiência",dp.eficiencia!==null?fmtPct(dp.eficiencia,1):"—","vs. peso saída real",G)}
      </div>

      <div style="text-align:center;color:#b0a090;font-size:10px;margin-top:20px;padding-top:10px;border-top:1px solid #e8ddd2">
        Organo Pará Fertilizantes &nbsp;·&nbsp; Sistema de Controle de Compostagem &nbsp;·&nbsp; ${CD.nome}
      </div>
    </div>`;

  document.getElementById("rel-prev").innerHTML=`
    <div id="pdf-leira" style="font-family:sans-serif;color:#2b1d12;font-size:13px;border-radius:12px;overflow:hidden;border:1px solid #e8ddd2;box-shadow:0 4px 16px rgba(0,0,0,.1)">${content}</div>
    <div style="text-align:center;margin-top:16px">
      <button class="btn btn-primary" onclick="Pages._abrirJanelaPDF('pdf-leira','Leira ${leira} — ${patio}')">
        <i class="ti ti-device-floppy"></i> Abrir para Imprimir / Salvar PDF
      </button>
    </div>`;
  document.getElementById("rel-prev").scrollIntoView({behavior:"smooth"});
};

/* ═══ GERAR PDF: COMBUSTÍVEL ═══ */
Pages._gerarRelCombustivel=function(){
  if(!CD){App.toast("Nenhum ciclo ativo","err");return;}
  const comb=CD.combustivel||{equipamentos:[],entradas:[],saidas:[]};
  const totE=comb.entradas.reduce((s,e)=>s+(parseFloat(e.litros)||0),0);
  const totS=comb.saidas.reduce((s,e)=>s+(parseFloat(e.litros)||0),0);
  const saldo=totE-totS;
  const G="#2d6a4f";const L="#e07b2a";const GD="#1b4332";
  const th=`style="padding:8px 10px;background:${G};color:#fff;text-align:left;font-size:11px"`;
  const thR=`style="padding:8px 10px;background:${G};color:#fff;text-align:right;font-size:11px"`;
  const thC=`style="padding:8px 10px;background:${G};color:#fff;text-align:center;font-size:11px"`;
  const sec=(title)=>`<div style="font-size:11px;text-transform:uppercase;letter-spacing:.07em;font-weight:700;color:${G};margin:18px 0 8px;padding-bottom:5px;border-bottom:2px solid ${G}22">${title}</div>`;

  const consMap={};
  comb.equipamentos.forEach(eq=>{consMap[eq.id]={nome:eq.nome,tipo:eq.tipo||"",placa:eq.placa||"—",total:0,n:0};});
  comb.saidas.forEach(s=>{if(consMap[s.eqId]){consMap[s.eqId].total+=parseFloat(s.litros)||0;consMap[s.eqId].n++;}});

  const eqRows=comb.equipamentos.length?comb.equipamentos.map((eq,i)=>{
    const c=consMap[eq.id]||{total:0,n:0};
    const pct=totS>0?c.total/totS:0;
    const bg=i%2===0?"#fff":"#faf8f5";
    return`<tr style="background:${bg}">
      <td style="padding:7px 10px"><strong>${c.nome}</strong></td>
      <td style="padding:7px 10px;color:#888">${c.tipo}</td>
      <td style="padding:7px 10px">${c.placa}</td>
      <td style="padding:7px 10px;text-align:center">${c.n}</td>
      <td style="padding:7px 10px;text-align:right;font-weight:700;color:${L}">${fmtNum(c.total,1)} L</td>
      <td style="padding:7px 10px;text-align:right">${c.n>0?fmtNum(c.total/c.n,1)+" L":"—"}</td>
      <td style="padding:7px 10px;text-align:right">${fmtPct(pct,1)}</td>
    </tr>`;
  }).join("")+`<tr style="background:#f2e9dc;font-weight:700">
    <td colspan="4" style="padding:7px 10px">TOTAL</td>
    <td style="padding:7px 10px;text-align:right;color:${L}">${fmtNum(totS,1)} L</td>
    <td colspan="2" style="padding:7px 10px"></td>
  </tr>`:`<tr><td colspan="7" style="padding:12px;text-align:center;color:#888">Nenhum equipamento cadastrado</td></tr>`;

  const entRows=comb.entradas.slice().sort((a,b)=>(b.data||"").localeCompare(a.data||"")).map((e,i)=>{
    const bg=i%2===0?"#fff":"#faf8f5";
    return`<tr style="background:${bg}">
      <td style="padding:6px 8px">${fmtDate(e.data)}</td>
      <td style="padding:6px 8px">${e.fornecedor||"—"}</td>
      <td style="padding:6px 8px">${e.nota||"—"}</td>
      <td style="padding:6px 8px;text-align:right;font-weight:700;color:${G}">${fmtNum(parseFloat(e.litros),1)} L</td>
      <td style="padding:6px 8px">${e.obs||"—"}</td>
    </tr>`;
  }).join("")||`<tr><td colspan="5" style="padding:12px;text-align:center;color:#888">Nenhuma entrada</td></tr>`;

  const saidaRows=comb.saidas.slice().sort((a,b)=>(b.data||"").localeCompare(a.data||"")).map((s,i)=>{
    const eq=comb.equipamentos.find(e=>e.id===s.eqId);
    const bg=i%2===0?"#fff":"#faf8f5";
    return`<tr style="background:${bg}">
      <td style="padding:6px 8px">${fmtDate(s.data)}</td>
      <td style="padding:6px 8px">${s.hora||"—"}</td>
      <td style="padding:6px 8px"><strong>${eq?eq.nome:"—"}</strong></td>
      <td style="padding:6px 8px;text-align:right;font-weight:700;color:${L}">${fmtNum(parseFloat(s.litros),1)} L</td>
      <td style="padding:6px 8px;text-align:right">${s.horimetro||"—"}</td>
      <td style="padding:6px 8px">${s.operador||"—"}</td>
      <td style="padding:6px 8px">${s.obs||"—"}</td>
    </tr>`;
  }).join("")||`<tr><td colspan="7" style="padding:12px;text-align:center;color:#888">Nenhum abastecimento</td></tr>`;

  const content=`
    ${Pages._cabecalhoPDF("Relatório de Combustível")}
    <div class="page-body">
      ${sec("Resumo do Período")}
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:8px">
        <div style="background:linear-gradient(135deg,#d8f3dc,#b7e4c7);border-radius:12px;padding:16px 18px;text-align:center;border:1px solid #95d5b2">
          <div style="font-size:10px;text-transform:uppercase;color:${GD};letter-spacing:.08em;margin-bottom:6px">⬇ Total Entradas</div>
          <div style="font-size:32px;font-weight:700;color:${GD}">${fmtNum(totE,1)} L</div>
          <div style="font-size:11px;color:#52b788;margin-top:4px">${comb.entradas.length} abastecimento(s) do tanque</div>
        </div>
        <div style="background:linear-gradient(135deg,#fde9d4,#ffd6a5);border-radius:12px;padding:16px 18px;text-align:center;border:1px solid #f0b97e">
          <div style="font-size:10px;text-transform:uppercase;color:#7a3318;letter-spacing:.08em;margin-bottom:6px">⬆ Total Saídas</div>
          <div style="font-size:32px;font-weight:700;color:#b85e15">${fmtNum(totS,1)} L</div>
          <div style="font-size:11px;color:${L};margin-top:4px">${comb.saidas.length} abastecimento(s) de máquinas</div>
        </div>
        <div style="background:${saldo<200?"linear-gradient(135deg,#fbe3d6,#f5c5b0)":saldo<500?"linear-gradient(135deg,#fff3cd,#ffe89a)":"linear-gradient(135deg,#d8f3dc,#b7e4c7)"};border-radius:12px;padding:16px 18px;text-align:center;border:1px solid ${saldo<200?"#f0a090":saldo<500?"#e8d060":"#95d5b2"}">
          <div style="font-size:10px;text-transform:uppercase;color:${saldo<200?"#7a3318":"#1b4332"};letter-spacing:.08em;margin-bottom:6px">⚖ Saldo Atual</div>
          <div style="font-size:32px;font-weight:700;color:${saldo<200?"#c0392b":saldo<500?"#b9842c":"#1b4332"}">${fmtNum(saldo,1)} L</div>
          <div style="font-size:11px;color:${saldo<200?"#c0392b":"#52b788"};margin-top:4px">${saldo<200?"⚠ Reabastecer urgente":saldo<500?"Atenção — nível baixo":"✓ Estoque normal"}</div>
        </div>
      </div>

      ${sec("Consumo por Equipamento / Máquina")}
      <table style="width:100%;border-collapse:collapse;font-size:12px;border-radius:8px;overflow:hidden">
        <thead><tr>
          <th ${th}>Equipamento</th><th ${th}>Tipo</th><th ${th}>Placa/Série</th>
          <th ${thC}>Abastec.</th><th ${thR}>Total (L)</th><th ${thR}>Média/abast.</th><th ${thR}>% do total</th>
        </tr></thead><tbody>${eqRows}</tbody>
      </table>

      ${sec("Histórico de Entradas de Diesel")}
      <table style="width:100%;border-collapse:collapse;font-size:12px;border-radius:8px;overflow:hidden">
        <thead><tr>
          <th ${th}>Data</th><th ${th}>Fornecedor</th><th ${th}>Nota Fiscal</th><th ${thR}>Litros</th><th ${th}>Observações</th>
        </tr></thead><tbody>${entRows}</tbody>
      </table>

      ${sec("Histórico de Abastecimentos por Máquina")}
      <table style="width:100%;border-collapse:collapse;font-size:12px;border-radius:8px;overflow:hidden">
        <thead><tr>
          <th ${th}>Data</th><th ${th}>Hora</th><th ${th}>Equipamento</th>
          <th ${thR}>Litros</th><th ${thR}>Horímetro/KM</th><th ${th}>Operador</th><th ${th}>Obs.</th>
        </tr></thead><tbody>${saidaRows}</tbody>
      </table>

      <div style="text-align:center;color:#b0a090;font-size:10px;margin-top:20px;padding-top:10px;border-top:1px solid #e8ddd2">
        Organo Pará Fertilizantes &nbsp;·&nbsp; Sistema de Controle de Compostagem &nbsp;·&nbsp; ${CD.nome}
      </div>
    </div>`;

  document.getElementById("rel-prev").innerHTML=`

      <td>${prazoBadge(dp.dr)}</td>
      <td>${dp.et.count}/6 <div class="progress-bar" style="width:60px;display:inline-block;vertical-align:middle"><div class="progress-fill" style="width:${Math.round(dp.et.pct*100)}%"></div></div></td>
      <td class="num">${fmtNum(dp.pesoEntrada,0)}</td><td class="num">${dp.pesoSaida!==null?fmtNum(dp.pesoSaida,0):"—"}</td>
      <td class="num" style="color:var(--laranja-esc)">${dp.quebraPct!==null?fmtPct(dp.quebraPct,1):"—"}</td>
      <td class="num" style="color:var(--verde-esc);font-weight:700">${dp.eficiencia!==null?fmtPct(dp.eficiencia,1):"—"}</td>
      <td>${statusBadge(dp.status)}</td>
    </tr>`;}).join("");
  el.innerHTML=`<div class="card"><div class="card-head"><div class="card-title"><i class="ti ti-layout-grid"></i> Painel Geral — ${STATE.ciclo||"Ciclo atual"}</div><span class="badge bv">${ativas.length} leiras</span></div>
    <div class="table-wrap"><table style="font-size:12.5px"><thead><tr><th>Leira</th><th>Pátio</th><th>Início</th>${etCols}<th>Prazo</th><th>Etapas</th><th>Entrada kg</th><th>Saída kg</th><th>Quebra %</th><th>Efic. %</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
};




/* ── COMBUSTÍVEL ── */
Pages.combustivel = function(el){
  if(!CD){el.innerHTML=`<div class="empty"><i class="ti ti-droplet"></i><div class="title">Nenhum ciclo ativo</div><div>Crie ou selecione um ciclo primeiro</div></div>`;return;}
  // Ensure combustivel exists (for ciclos created before this module was added)
  if(!CD.combustivel) CD.combustivel={equipamentos:[],entradas:[],saidas:[]};
  if(!CD.combustivel.equipamentos) CD.combustivel.equipamentos=[];
  if(!CD.combustivel.entradas) CD.combustivel.entradas=[];
  if(!CD.combustivel.saidas) CD.combustivel.saidas=[];
  const comb = CD.combustivel;
  const totalEntrada = comb.entradas.reduce((s,e)=>s+(parseFloat(e.litros)||0),0);
  const totalSaida   = comb.saidas.reduce((s,e)=>s+(parseFloat(e.litros)||0),0);
  const saldo = totalEntrada - totalSaida;

  // consumo por equipamento
  const consMap = {};
  comb.equipamentos.forEach(eq=>{consMap[eq.id]={eq,total:0,abastecimentos:0};});
  comb.saidas.forEach(s=>{if(consMap[s.eqId]){consMap[s.eqId].total+=parseFloat(s.litros)||0;consMap[s.eqId].abastecimentos++;}});

  const eqRows = comb.equipamentos.map(eq=>{
    const c=consMap[eq.id]||{total:0,abastecimentos:0};
    const media = c.abastecimentos>0?(c.total/c.abastecimentos):0;
    return`<tr>
      <td><strong>${eq.nome}</strong></td>
      <td><span class="badge bc">${eq.tipo||"—"}</span></td>
      <td>${eq.placa||"—"}</td>
      <td class="num" style="font-weight:700;color:var(--laranja)">${fmtNum(c.total,1)} L</td>
      <td class="num">${c.abastecimentos}</td>
      <td class="num">${media>0?fmtNum(media,1)+" L/abast.":"—"}</td>
      <td>
        <button class="btn btn-sm" onclick="Pages._editEq('${eq.id}')"><i class="ti ti-pencil"></i></button>
        <button class="btn btn-sm btn-danger" onclick="Pages._delEq('${eq.id}')"><i class="ti ti-trash"></i></button>
      </td>
    </tr>`;
  }).join("")||`<tr><td colspan="7" style="text-align:center;padding:16px;color:var(--ink-soft)">Nenhum equipamento cadastrado</td></tr>`;

  const entRows = comb.entradas.slice().sort((a,b)=>(b.data||"").localeCompare(a.data||"")).slice(0,15).map(e=>
    `<tr><td>${fmtDate(e.data)}</td><td>${e.fornecedor||"—"}</td><td>${e.nota||"—"}</td>
     <td class="num" style="font-weight:700;color:var(--verde)">${fmtNum(parseFloat(e.litros),1)} L</td>
     <td>${e.obs||"—"}</td>
     <td><button class="btn btn-sm btn-danger" onclick="Pages._delEntrada('${e.id}')"><i class="ti ti-trash"></i></button></td>
    </tr>`).join("")||`<tr><td colspan="6" style="text-align:center;padding:16px;color:var(--ink-soft)">Nenhuma entrada registrada</td></tr>`;

  const saidaRows = comb.saidas.slice().sort((a,b)=>(b.data||"").localeCompare(a.data||"")).slice(0,20).map(s=>{
    const eq=comb.equipamentos.find(e=>e.id===s.eqId);
    return`<tr>
      <td>${fmtDate(s.data)} ${s.hora?`<small style="color:var(--ink-soft)">${s.hora}</small>`:""}</td>
      <td><strong>${eq?eq.nome:"—"}</strong></td>
      <td class="num" style="font-weight:700;color:var(--laranja)">${fmtNum(parseFloat(s.litros),1)} L</td>
      <td class="num">${s.horimetro||"—"}</td>
      <td>${s.operador||"—"}</td>
      <td>${s.obs||"—"}</td>
      <td><button class="btn btn-sm btn-danger" onclick="Pages._delSaida('${s.id}')"><i class="ti ti-trash"></i></button></td>
    </tr>`;
  }).join("")||`<tr><td colspan="7" style="text-align:center;padding:16px;color:var(--ink-soft)">Nenhuma saída registrada</td></tr>`;

  const saldoCls = saldo<200?"br":saldo<500?"ba":"bv";

  el.innerHTML=`
    <div class="grid g4" style="margin-bottom:16px">
      <div class="metric m-verde"><div class="label">Total entradas</div><div class="value">${fmtNum(totalEntrada,0)} L</div><div class="sub">${comb.entradas.length} abastecimentos</div></div>
      <div class="metric m-laranja"><div class="label">Total saídas</div><div class="value">${fmtNum(totalSaida,0)} L</div><div class="sub">${comb.saidas.length} registros</div></div>
      <div class="metric m-${saldo<200?"marrom":saldo<500?"laranja":"verde"}"><div class="label">Saldo atual</div><div class="value" style="color:${saldo<200?"#c0392b":saldo<500?"var(--laranja)":"var(--verde)"}">${fmtNum(saldo,0)} L</div><div class="sub">${saldo<200?"⚠ Estoque baixo":saldo<500?"Atenção":"OK"}</div></div>
      <div class="metric m-marrom"><div class="label">Equipamentos</div><div class="value">${comb.equipamentos.length}</div><div class="sub">cadastrados</div></div>
    </div>

    <!-- Equipamentos -->
    <div class="card" style="margin-bottom:16px">
      <div class="card-head">
        <div class="card-title"><i class="ti ti-tractor"></i> Equipamentos / Máquinas</div>
        <button class="btn btn-primary" onclick="Pages._newEq()"><i class="ti ti-plus"></i> Novo Equipamento</button>
      </div>
      <div class="table-wrap"><table>
        <thead><tr><th>Equipamento</th><th>Tipo</th><th>Placa / Série</th><th>Consumo total</th><th>Abastecimentos</th><th>Média por abast.</th><th>Ações</th></tr></thead>
        <tbody>${eqRows}</tbody>
      </table></div>
    </div>

    <div class="grid g2" style="gap:16px;margin-bottom:16px">
      <!-- Entradas -->
      <div class="card">
        <div class="card-head">
          <div class="card-title"><i class="ti ti-arrow-bar-down" style="color:var(--verde)"></i> Entradas de Diesel</div>
          <button class="btn btn-primary btn-sm" onclick="Pages._newEntrada()"><i class="ti ti-plus"></i> Registrar entrada</button>
        </div>
        <div class="table-wrap"><table>
          <thead><tr><th>Data</th><th>Fornecedor</th><th>Nota</th><th>Litros</th><th>Obs.</th><th></th></tr></thead>
          <tbody>${entRows}</tbody>
        </table></div>
      </div>

      <!-- Saídas -->
      <div class="card">
        <div class="card-head">
          <div class="card-title"><i class="ti ti-arrow-bar-up" style="color:var(--laranja)"></i> Saídas / Abastecimentos</div>
          <button class="btn btn-primary btn-sm" onclick="Pages._newSaida()"><i class="ti ti-plus"></i> Registrar saída</button>
        </div>
        <div class="table-wrap"><table>
          <thead><tr><th>Data / Hora</th><th>Equipamento</th><th>Litros</th><th>Horímetro</th><th>Operador</th><th>Obs.</th><th></th></tr></thead>
          <tbody>${saidaRows}</tbody>
        </table></div>
      </div>
    </div>

    <!-- Relatório consumo -->
    <div class="card">
      <div class="card-head">
        <div class="card-title"><i class="ti ti-chart-bar"></i> Relatório de Consumo por Equipamento</div>
        <button class="btn btn-sm" onclick="Pages._printCombustivel()"><i class="ti ti-printer"></i> Imprimir</button>
      </div>
      <div id="comb-chart-area">
        ${comb.equipamentos.length?`<canvas id="chartComb" height="60"></canvas>`:`<div class="empty" style="padding:20px"><i class="ti ti-chart-bar"></i><div class="title">Cadastre equipamentos para ver o gráfico</div></div>`}
      </div>
    </div>`;

  // Draw chart
  requestAnimationFrame(()=>{
    const canvas=document.getElementById("chartComb");
    if(!canvas||typeof Chart==="undefined")return;
    const labels=comb.equipamentos.map(e=>e.nome);
    const data=comb.equipamentos.map(e=>consMap[e.id]?+consMap[e.id].total.toFixed(1):0);
    new Chart(canvas,{type:"bar",data:{labels,datasets:[{label:"Consumo (L)",data,backgroundColor:"rgba(224,123,42,.7)",borderColor:"#e07b2a",borderWidth:1.5,borderRadius:6}]},
      options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{title:{display:true,text:"Litros"},beginAtZero:true}}}});
  });

  // Modals
  const eqOpts = comb.equipamentos.map(e=>`<option value="${e.id}">${e.nome}${e.placa?" ("+e.placa+")":""}</option>`).join("");

  _modal("modal-eq","Equipamento / Máquina","ti-tractor",`
    <input type="hidden" id="eq-id"/>
    <div class="field"><label>Nome do equipamento</label><input id="eq-nome" placeholder="Ex: Trator Massey 275"/></div>
    <div class="field-row">
      <div class="field"><label>Tipo</label>
        <select id="eq-tipo">
          <option value="">—</option>
          <option>Trator</option><option>Caminhão</option><option>Escavadeira</option>
          <option>Carregadeira</option><option>Motocicleta</option><option>Gerador</option><option>Outro</option>
        </select>
      </div>
      <div class="field"><label>Placa / Nº Série</label><input id="eq-placa" placeholder="Ex: ABC-1234"/></div>
    </div>
    <div class="field"><label>Observações</label><input id="eq-obs" placeholder="Detalhes do equipamento..."/></div>`,
  ()=>Pages._saveEq());

  _modal("modal-entrada","Entrada de Diesel","ti-arrow-bar-down",`
    <div class="field-row">
      <div class="field"><label>Data</label><input type="date" id="ent-data" value="${todayISO()}"/></div>
      <div class="field"><label>Quantidade (litros)</label><input type="number" id="ent-litros" step="0.1" min="0" placeholder="0"/></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Fornecedor</label><input id="ent-forn" placeholder="Nome do fornecedor"/></div>
      <div class="field"><label>Nº Nota Fiscal</label><input id="ent-nota" placeholder="NF-00123"/></div>
    </div>
    <div class="field"><label>Observações</label><input id="ent-obs" placeholder="Ex: abastecimento tanque principal"/></div>`,
  ()=>Pages._saveEntrada());

  _modal("modal-saida","Abastecimento / Saída","ti-arrow-bar-up",`
    <div class="field-row">
      <div class="field"><label>Data</label><input type="date" id="sai-data" value="${todayISO()}"/></div>
      <div class="field"><label>Hora</label><input type="time" id="sai-hora"/></div>
    </div>
    <div class="field"><label>Equipamento</label>
      <select id="sai-eq">${eqOpts||`<option value="">— cadastre equipamentos primeiro —</option>`}</select>
    </div>
    <div class="field-row">
      <div class="field"><label>Litros abastecidos</label><input type="number" id="sai-litros" step="0.1" min="0" placeholder="0"/></div>
      <div class="field"><label>Horímetro / KM</label><input type="number" id="sai-hor" step="0.1" placeholder="Leitura atual"/></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Operador / Responsável</label><input id="sai-oper" placeholder="Nome"/></div>
      <div class="field"><label>Observações</label><input id="sai-obs" placeholder="Opcional"/></div>
    </div>`,
  ()=>Pages._saveSaida());
};

// Equipamentos CRUD
Pages._newEq=function(){document.getElementById("eq-id").value="";["eq-nome","eq-placa","eq-obs"].forEach(id=>document.getElementById(id).value="");document.getElementById("eq-tipo").value="";App.openModal("modal-eq");};
Pages._editEq=function(id){const eq=CD.combustivel.equipamentos.find(e=>e.id===id);if(!eq)return;document.getElementById("eq-id").value=eq.id;document.getElementById("eq-nome").value=eq.nome||"";document.getElementById("eq-tipo").value=eq.tipo||"";document.getElementById("eq-placa").value=eq.placa||"";document.getElementById("eq-obs").value=eq.obs||"";App.openModal("modal-eq");};
Pages._saveEq=async function(){
  const id=document.getElementById("eq-id").value;
  const nome=document.getElementById("eq-nome").value.trim();
  if(!nome){App.toast("Informe o nome do equipamento","err");return;}
  const data={nome,tipo:document.getElementById("eq-tipo").value,placa:document.getElementById("eq-placa").value,obs:document.getElementById("eq-obs").value};
  if(id){const eq=CD.combustivel.equipamentos.find(e=>e.id===id);if(eq)Object.assign(eq,data);}
  else{CD.combustivel.equipamentos.push({id:uid(),...data});}
  // auto-saved to SupabaseApp.closeModal("modal-eq");App.navigate("combustivel");App.toast("Equipamento salvo!");
};
Pages._delEq=function(id){if(!confirm("Remover equipamento? As saídas relacionadas perderão a referência."))return;CD.combustivel.equipamentos=CD.combustivel.equipamentos.filter(e=>e.id!==id);// auto-saved to SupabaseApp.navigate("combustivel");App.toast("Removido.");};

// Entradas CRUD
Pages._newEntrada=function(){App.openModal("modal-entrada");};
Pages._saveEntrada=async function(){
  const litros=parseFloat(document.getElementById("ent-litros").value);
  if(!litros||litros<=0){App.toast("Informe a quantidade em litros","err");return;}
  const data=document.getElementById("ent-data").value;if(!data){App.toast("Informe a data","err");return;}
  CD.combustivel.entradas.push({id:uid(),data,litros:litros.toString(),fornecedor:document.getElementById("ent-forn").value,nota:document.getElementById("ent-nota").value,obs:document.getElementById("ent-obs").value});
  // auto-saved to SupabaseApp.closeModal("modal-entrada");App.navigate("combustivel");App.toast("Entrada registrada! Saldo atualizado.");
};
Pages._delEntrada=function(id){if(!confirm("Remover esta entrada?"))return;CD.combustivel.entradas=CD.combustivel.entradas.filter(e=>e.id!==id);// auto-saved to SupabaseApp.navigate("combustivel");};

// Saídas CRUD
Pages._newSaida=function(){App.openModal("modal-saida");};
Pages._saveSaida=async function(){
  const litros=parseFloat(document.getElementById("sai-litros").value);
  if(!litros||litros<=0){App.toast("Informe a quantidade em litros","err");return;}
  const data=document.getElementById("sai-data").value;if(!data){App.toast("Informe a data","err");return;}
  const eqId=document.getElementById("sai-eq").value;if(!eqId){App.toast("Selecione o equipamento","err");return;}
  CD.combustivel.saidas.push({id:uid(),data,hora:document.getElementById("sai-hora").value,eqId,litros:litros.toString(),horimetro:document.getElementById("sai-hor").value,operador:document.getElementById("sai-oper").value,obs:document.getElementById("sai-obs").value});
  // auto-saved to SupabaseApp.closeModal("modal-saida");App.navigate("combustivel");App.toast("Abastecimento registrado!");
};
Pages._delSaida=function(id){if(!confirm("Remover este registro?"))return;CD.combustivel.saidas=CD.combustivel.saidas.filter(s=>s.id!==id);// auto-saved to SupabaseApp.navigate("combustivel");};

// Print
Pages._printCombustivel=function(){
  if(!CD)return;
  const comb=CD.combustivel;
  const totalE=comb.entradas.reduce((s,e)=>s+(parseFloat(e.litros)||0),0);
  const totalS=comb.saidas.reduce((s,e)=>s+(parseFloat(e.litros)||0),0);
  const saldo=totalE-totalS;
  const consMap={};
  comb.equipamentos.forEach(eq=>{consMap[eq.id]={nome:eq.nome,tipo:eq.tipo||"",total:0,n:0};});
  comb.saidas.forEach(s=>{if(consMap[s.eqId]){consMap[s.eqId].total+=parseFloat(s.litros)||0;consMap[s.eqId].n++;}});
  const eqTable=comb.equipamentos.map(eq=>{const c=consMap[eq.id];return`<tr style="border-bottom:1px solid #eee"><td style="padding:6px 8px"><strong>${c.nome}</strong></td><td style="padding:6px 8px">${c.tipo}</td><td style="padding:6px 8px;text-align:right">${c.n}</td><td style="padding:6px 8px;text-align:right;font-weight:700;color:#e07b2a">${fmtNum(c.total,1)} L</td></tr>`;}).join("");
  const w=window.open("","_blank");
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Relatório Combustível</title><style>body{font-family:sans-serif;padding:24px;color:#2b1d12}h1{color:#1b4332}h2{color:#2d6a4f;margin-top:20px}table{width:100%;border-collapse:collapse}th{background:#2d6a4f;color:#fff;padding:7px 10px;text-align:left}@media print{button{display:none}}</style></head><body>
    <h1>🌿 Organo Pará — Relatório de Combustível</h1>
    <p><strong>Ciclo:</strong> ${CD.nome} &nbsp;|&nbsp; <strong>Gerado:</strong> ${fmtDate(todayISO())}</p>
    <div style="display:flex;gap:24px;margin:16px 0;flex-wrap:wrap">
      <div style="background:#d8f3dc;border-radius:8px;padding:12px 20px"><div style="font-size:11px;text-transform:uppercase">Total entradas</div><div style="font-size:24px;font-weight:700">${fmtNum(totalE,1)} L</div></div>
      <div style="background:#fde9d4;border-radius:8px;padding:12px 20px"><div style="font-size:11px;text-transform:uppercase">Total saídas</div><div style="font-size:24px;font-weight:700">${fmtNum(totalS,1)} L</div></div>
      <div style="background:${saldo<200?"#fbe3d6":"#d8f3dc"};border-radius:8px;padding:12px 20px"><div style="font-size:11px;text-transform:uppercase">Saldo atual</div><div style="font-size:24px;font-weight:700;color:${saldo<200?"#c0392b":"#1b4332"}">${fmtNum(saldo,1)} L</div></div>
    </div>
    <h2>Consumo por Equipamento</h2>
    <table><thead><tr><th>Equipamento</th><th>Tipo</th><th>Abastecimentos</th><th>Total (L)</th></tr></thead><tbody>${eqTable}</tbody></table>
    <h2>Histórico de Entradas</h2>
    <table><thead><tr><th>Data</th><th>Fornecedor</th><th>Nota</th><th>Litros</th></tr></thead><tbody>
    ${comb.entradas.map(e=>`<tr style="border-bottom:1px solid #eee"><td style="padding:5px 8px">${fmtDate(e.data)}</td><td style="padding:5px 8px">${e.fornecedor||"—"}</td><td style="padding:5px 8px">${e.nota||"—"}</td><td style="padding:5px 8px;text-align:right;font-weight:700">${fmtNum(parseFloat(e.litros),1)} L</td></tr>`).join("")}
    </tbody></table>
    <h2>Histórico de Saídas</h2>
    <table><thead><tr><th>Data</th><th>Hora</th><th>Equipamento</th><th>Litros</th><th>Horímetro</th><th>Operador</th></tr></thead><tbody>
    ${comb.saidas.sort((a,b)=>(b.data||"").localeCompare(a.data||"")).map(s=>{const eq=comb.equipamentos.find(e=>e.id===s.eqId);return`<tr style="border-bottom:1px solid #eee"><td style="padding:5px 8px">${fmtDate(s.data)}</td><td style="padding:5px 8px">${s.hora||"—"}</td><td style="padding:5px 8px"><strong>${eq?eq.nome:"—"}</strong></td><td style="padding:5px 8px;text-align:right;font-weight:700;color:#e07b2a">${fmtNum(parseFloat(s.litros),1)} L</td><td style="padding:5px 8px">${s.horimetro||"—"}</td><td style="padding:5px 8px">${s.operador||"—"}</td></tr>`;}).join("")}
    </tbody></table>
    <button onclick="window.print()" style="margin-top:20px;padding:10px 20px;background:#e07b2a;color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer">🖨️ Imprimir / Salvar PDF</button>
    </body></html>`);
  w.document.close();
};

// Add CSS animation for spinner
const spinStyle=document.createElement('style');
spinStyle.textContent='@keyframes spin{to{transform:rotate(360deg)}}';
document.head.appendChild(spinStyle);

document.getElementById("loginScreen").style.display="flex";
document.getElementById("appShell").style.display="none";

// Auto-restore session if user was logged in
if(META.currentUser){
  document.getElementById("loginScreen").style.display="none";
  document.getElementById("appShell").style.display="block";
  // Re-login from Supabase to verify user still exists
  DB.loginUsuario(META.currentUser.user, "").then(found => {
    // Just load, don't re-verify password
    App.init().then(() => {
      if(META.cicloAtivo){
        Ciclos.switchTo(META.cicloAtivo);
      }
    });
  }).catch(()=>{
    App.init().then(() => {
      if(META.cicloAtivo) Ciclos.switchTo(META.cicloAtivo);
    });
  });
}

// Handle enter key on login
document.addEventListener('keydown', function(e){
  if(e.key==='Enter'&&document.getElementById('loginScreen').style.display!=='none'){
    Auth.login();
  }
});

</script>
</body>
</html>
